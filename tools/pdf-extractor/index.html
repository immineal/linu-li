<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Image Extractor | Linus Linhof</title>
    <!-- Paths relative to /tools/tools/[tool-name]/index.html -->
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    
    <!-- External Libraries -->
    <!-- JSZip for bundling images -->
    <script src="../../assets/vendor/jszip.min.js"></script>
    <!-- FileSaver for saving the zip -->
    <script src="../../assets/vendor/FileSaver.min.js"></script>
    <!-- PDF.js for parsing -->
    <script src="../../assets/vendor/pdf.min.js"></script>
    
    <style>
        /* Minimal custom styling for the image grid, reusing existing variables */
        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 1rem;
            margin-top: 1.5rem;
        }
        .image-card {
            border: 1px solid var(--border);
            background: var(--input-bg);
            border-radius: 4px;
            padding: 0.5rem;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: transform 0.2s;
        }
        .image-card:hover {
            border-color: var(--accent);
        }
        .image-preview {
            width: 100%;
            height: 120px;
            object-fit: contain;
            background-color: #fff; /* To see transparent PNGs clearly */
            border-radius: 2px;
            margin-bottom: 0.5rem;
        }
        .image-meta {
            font-size: 0.75rem;
            color: var(--ink-secondary);
            text-align: center;
            font-family: var(--font-mono);
            margin-bottom: 0.5rem;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>PDF Image Extractor</h1>
                <p>Upload a PDF to automatically scrape and extract all embedded images.</p>
            </div>

            <div class="card">
                
                <!-- SECTION: FILE UPLOAD -->
                <div class="drop-zone" id="dropZone">
                    <span class="drop-icon">🖼️</span>
                    <p>Drag & Drop PDF file here</p>
                    <p style="font-size: 0.85rem; opacity: 0.7;">(Extracts bitmaps, JPEGs, PNGs, Texts, and Fonts)</p>
                    <input type="file" id="fileInput" class="hidden" accept="application/pdf">
                </div>
                
                <!-- SECTION: FILE INFO -->
                <ul class="file-list" id="fileList"></ul>

                <!-- SECTION: CONTROLS -->
                <div class="hidden" id="controlPanel">
                    <div style="display: flex; gap: 1rem; justify-content: center; margin-bottom: 1rem; flex-wrap: wrap;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer;">
                            <input type="checkbox" id="extractImagesCb" checked> Images
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer;">
                            <input type="checkbox" id="extractTextCb" checked> Text
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; cursor: pointer;">
                            <input type="checkbox" id="extractFontsCb" checked> Fonts
                        </label>
                    </div>
                    <div class="button-group">
                        <button class="button" id="processBtn">Extract Assets</button>
                        <button class="button outline" id="resetBtn">Reset</button>
                    </div>
                </div>

                <!-- SECTION: PROGRESS -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <p id="statusText" style="text-align: center; font-size: 0.9rem; margin-top: 0.5rem; display: none;"></p>

                <!-- SECTION: RESULTS -->
                <div class="result-box hidden" id="resultBox">
                    <div style="display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px;">
                        <h3>Extracted Assets <span id="imgCount" style="font-weight: normal; font-size: 0.9rem; color: var(--ink-secondary);"></span></h3>
                        <button class="button secondary sm" id="downloadAllBtn">Download All (.zip)</button>
                    </div>
                    
                    <div class="image-grid" id="imageGrid">
                        <!-- Assets injected here -->
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <!-- CORE LAYOUT SCRIPT -->
    <script src="../../assets/js/layout.js"></script>
    
    <!-- TOOL LOGIC -->
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = '../../assets/vendor/pdf.worker.min.js';

        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const controlPanel = document.getElementById('controlPanel');
        const processBtn = document.getElementById('processBtn');
        const resetBtn = document.getElementById('resetBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const statusText = document.getElementById('statusText');
        const resultBox = document.getElementById('resultBox');
        const imageGrid = document.getElementById('imageGrid');
        const imgCount = document.getElementById('imgCount');
        const downloadAllBtn = document.getElementById('downloadAllBtn');

        let currentFile = null;
        let extractedImages = []; // Stores { blob, filename }
        let extractedTexts = [];
        let extractedFonts = [];

        // 1. Initialize Drop Zone
        setupDropZone(dropZone, fileInput, handleFileSelection);

        function handleFileSelection(files) {
            if (files.length === 0) return;
            
            const file = files[0];
            if (file.type !== 'application/pdf') {
                showToast('Please upload a valid PDF file.', 'error');
                return;
            }

            currentFile = file;
            
            // Update UI
            fileList.innerHTML = `
                <li class="file-item">
                    <div class="file-info">
                        <span style="font-size: 1.5rem;">📄</span>
                        <div>
                            <div class="file-name">${file.name}</div>
                            <div class="file-size">${formatFileSize(file.size)}</div>
                        </div>
                    </div>
                    <button class="remove-file" onclick="resetTool()">×</button>
                </li>
            `;
            
            dropZone.classList.add('hidden');
            controlPanel.classList.remove('hidden');
            resultBox.classList.add('hidden');
        }

        // 2. Process Logic
        processBtn.addEventListener('click', async () => {
            if (!currentFile) return;

            processBtn.disabled = true;
            progressContainer.style.display = 'block';
            statusText.style.display = 'block';
            statusText.textContent = 'Initializing PDF...';
            progressBar.style.width = '5%';
            imageGrid.innerHTML = '';
            extractedImages = [];
            extractedTexts = [];
            extractedFonts = [];

            const doImages = document.getElementById('extractImagesCb').checked;
            const doText = document.getElementById('extractTextCb').checked;
            const doFonts = document.getElementById('extractFontsCb').checked;

            if (!doImages && !doText && !doFonts) {
                showToast('Please select at least one asset type to extract.', 'error');
                processBtn.disabled = false;
                progressContainer.style.display = 'none';
                statusText.style.display = 'none';
                return;
            }

            try {
                const arrayBuffer = await currentFile.arrayBuffer();
                const loadingTask = pdfjsLib.getDocument(arrayBuffer);
                const pdf = await loadingTask.promise;

                const numPages = pdf.numPages;
                let imagesFoundTotal = 0;
                let textFoundTotal = 0;
                let fontsFoundTotal = 0;
                let processedFonts = new Set(); // Prevent duplicates

                for (let i = 1; i <= numPages; i++) {
                    // Chunking to keep UI highly responsive for huge PDFs
                    if (i % 5 === 0) {
                        await new Promise(r => setTimeout(r, 0));
                    }

                    // Update Progress
                    const percent = Math.round((i / numPages) * 100);
                    progressBar.style.width = `${percent}%`;
                    statusText.textContent = `Scanning page ${i} of ${numPages}...`;

                    let page = null;
                    try {
                        page = await pdf.getPage(i);
                        
                        // Extract Text
                        if (doText) {
                            try {
                                const textContent = await page.getTextContent();
                                if (textContent && textContent.items && textContent.items.length > 0) {
                                    const pageText = textContent.items.map(item => item.str).join('\n');
                                    if (pageText.trim()) {
                                        const blob = new Blob([pageText], { type: 'text/plain' });
                                        const filename = `text_p${i}.txt`;
                                        const txtObj = {
                                            blob: blob,
                                            filename: filename,
                                            url: URL.createObjectURL(blob),
                                            preview: pageText.substring(0, 100) + (pageText.length > 100 ? '...' : '')
                                        };
                                        extractedTexts.push(txtObj);
                                        addTextToGrid(txtObj);
                                        textFoundTotal++;
                                    }
                                }
                            } catch (txtErr) {
                                console.warn(`Failed to extract text on page ${i}`, txtErr);
                            }
                        }

                        // Extract Images and Fonts via Operators
                        if (doImages || doFonts) {
                            const operatorList = await page.getOperatorList();
                            
                            const validImgOperators = [
                                pdfjsLib.OPS.paintImageXObject,
                                pdfjsLib.OPS.paintInlineImageXObject
                            ];

                            for (let j = 0; j < operatorList.fnArray.length; j++) {
                                const op = operatorList.fnArray[j];
                                
                                // Process Images
                                if (doImages && validImgOperators.includes(op)) {
                                    const imgName = operatorList.argsArray[j][0];
                                    try {
                                        const imageObj = await page.objs.get(imgName);
                                        if (imageObj) {
                                            const processedImg = await processPdfImage(imageObj, i, imagesFoundTotal + 1);
                                            if (processedImg) {
                                                extractedImages.push(processedImg);
                                                addImageToGrid(processedImg);
                                                imagesFoundTotal++;
                                            }
                                        }
                                    } catch (imgErr) {
                                        console.warn(`Failed to extract image ${imgName} on page ${i}`, imgErr);
                                    }
                                }

                                // Process Fonts
                                if (doFonts && op === pdfjsLib.OPS.setFont) {
                                    const fontName = operatorList.argsArray[j][0];
                                    if (!processedFonts.has(fontName)) {
                                        processedFonts.add(fontName);
                                        try {
                                            const fontObj = await page.commonObjs.has(fontName) ? await page.commonObjs.get(fontName) : await page.objs.get(fontName);
                                            if (fontObj && fontObj.data && fontObj.data.length > 0) {
                                                const blob = new Blob([fontObj.data], { type: 'application/octet-stream' });
                                                // Check for OpenType / TrueType signature roughly
                                                let ext = "bin";
                                                if (fontObj.data[0] === 0x00 && fontObj.data[1] === 0x01 && fontObj.data[2] === 0x00 && fontObj.data[3] === 0x00) {
                                                    ext = "ttf";
                                                } else if (fontObj.data[0] === 0x4F && fontObj.data[1] === 0x54 && fontObj.data[2] === 0x54 && fontObj.data[3] === 0x4F) {
                                                    ext = "otf";
                                                } else if (fontObj.mimetype && fontObj.mimetype.includes('truetype')) {
                                                    ext = "ttf";
                                                }
                                                const filename = `font_${fontObj.loadedName || fontName}.${ext}`;
                                                const fntObj = {
                                                    blob: blob,
                                                    filename: filename,
                                                    url: URL.createObjectURL(blob),
                                                    name: fontObj.loadedName || fontName
                                                };
                                                extractedFonts.push(fntObj);
                                                addFontToGrid(fntObj);
                                                fontsFoundTotal++;
                                            }
                                        } catch (fntErr) {
                                            console.warn(`Failed to extract font ${fontName} on page ${i}`, fntErr);
                                        }
                                    }
                                }
                            }
                        }
                    } catch (pageErr) {
                        console.error(`Error processing page ${i}`, pageErr);
                    } finally {
                        if (page) {
                            try {
                                page.cleanup();
                            } catch (e) {}
                        }
                    }
                }

                try {
                    pdf.destroy();
                } catch (e) {}

                // Finish
                progressBar.style.width = '100%';
                const totalAssets = imagesFoundTotal + textFoundTotal + fontsFoundTotal;
                statusText.textContent = `Complete! Found ${totalAssets} assets.`;
                imgCount.textContent = `(${totalAssets} assets)`;
                resultBox.classList.remove('hidden');
                
                if (totalAssets === 0) {
                    showToast('No extractable assets found in this PDF matching the selected types.', 'info');
                    imageGrid.innerHTML = '<p style="grid-column: 1/-1; text-align: center; color: var(--ink-secondary);">No valid assets found based on your filters.</p>';
                    downloadAllBtn.disabled = true;
                } else {
                    downloadAllBtn.disabled = false;
                    let msg = [];
                    if(imagesFoundTotal) msg.push(`${imagesFoundTotal} images`);
                    if(textFoundTotal) msg.push(`${textFoundTotal} texts`);
                    if(fontsFoundTotal) msg.push(`${fontsFoundTotal} fonts`);
                    showToast(`Successfully extracted: ${msg.join(', ')}.`, 'success');
                }

            } catch (error) {
                console.error(error);
                showToast('Error processing PDF: ' + error.message, 'error');
                statusText.textContent = 'Error occurred.';
            } finally {
                processBtn.disabled = false;
            }
        });

        // 3. Image Processing Helper
        // Converts PDF Image Object -> HTML Canvas -> Blob
        async function processPdfImage(img, pageNum, index) {
            if (!img || !img.width || !img.height) return null;

            const width = img.width;
            const height = img.height;
            
            // Skip tiny images (likely icons or artifacts)
            if (width < 20 || height < 20) return null;

            const canvas = document.createElement('canvas');
            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');

            // Handle different image kinds defined by PDF.js
            // 1 = Grayscale, 2 = RGB, 3 = CMYK (converted by PDF.js mostly), etc.
            // Using a temporary canvas to paint the RGBA data provided by PDF.js
            
            let imageData = ctx.createImageData(width, height);

            if (img.kind === pdfjsLib.ImageKind.GRAYSCALE_1BPP) {
                // 1 bit per pixel
                 const data = img.data;
                 const len = width * height;
                 // This decoding is complex, usually PDF.js provides a bitmap in newer versions
                 // Fallback: if bitmap exists (browser supported), use it
                 if (img.bitmap) {
                     ctx.drawImage(img.bitmap, 0, 0);
                 } else {
                     // Skip complex manual decoding for brevity in this tool context
                     // or return null if unsupported format
                     return null; 
                 }
            } else if (img.bitmap) {
                // Valid ImageBitmap (fastest)
                ctx.drawImage(img.bitmap, 0, 0);
            } else if (img.data) {
                // Raw RGBA data
                // If the array is Uint8ClampedArray, we can put it directly
                // Some PDF images might need color space conversion, handled by PDF.js usually
                if (img.data.length === width * height * 4) {
                    imageData.data.set(img.data);
                    ctx.putImageData(imageData, 0, 0);
                } else if (img.data.length === width * height * 3) {
                    // RGB to RGBA
                    const src = img.data;
                    const dest = imageData.data;
                    let j = 0;
                    for (let i = 0; i < src.length; i += 3) {
                        dest[j++] = src[i];     // R
                        dest[j++] = src[i + 1]; // G
                        dest[j++] = src[i + 2]; // B
                        dest[j++] = 255;        // Alpha
                    }
                    ctx.putImageData(imageData, 0, 0);
                } else {
                     // Fallback for masks or other formats
                     return null; 
                }
            } else {
                return null;
            }

            // Determine Extension
            const blob = await new Promise(resolve => canvas.toBlob(resolve, 'image/png'));
            if (!blob) return null;

            const filename = `image_p${pageNum}_${index}.png`;

            return {
                blob: blob,
                filename: filename,
                width: width,
                height: height,
                url: URL.createObjectURL(blob)
            };
        }

        // 4. UI Helper: Add to Grid
        function addImageToGrid(imgObj) {
            const div = document.createElement('div');
            div.className = 'image-card';
            div.innerHTML = `
                <img src="${imgObj.url}" class="image-preview" alt="${imgObj.filename}">
                <div class="image-meta">${imgObj.width}x${imgObj.height}</div>
                <button class="button sm outline" style="width:100%; font-size: 0.75rem;" onclick="downloadSingle('${imgObj.url}', '${imgObj.filename}')">Download</button>
            `;
            imageGrid.appendChild(div);
        }

        function addTextToGrid(txtObj) {
            const div = document.createElement('div');
            div.className = 'image-card';
            div.innerHTML = `
                <div class="image-preview" style="padding: 0.5rem; font-size: 0.65rem; text-align: left; overflow: hidden; background: #fafafa; border: 1px solid #eee;">
                    ${txtObj.preview.replace(/</g, '&lt;').replace(/>/g, '&gt;')}
                </div>
                <div class="image-meta" title="${txtObj.filename}">📄 Text</div>
                <button class="button sm outline" style="width:100%; font-size: 0.75rem;" onclick="downloadSingle('${txtObj.url}', '${txtObj.filename}')">Download</button>
            `;
            imageGrid.appendChild(div);
        }

        function addFontToGrid(fntObj) {
            const div = document.createElement('div');
            div.className = 'image-card';
            div.innerHTML = `
                <div class="image-preview" style="display: flex; align-items: center; justify-content: center; font-size: 2rem; background: #fafafa; border: 1px solid #eee;">
                    🔤
                </div>
                <div class="image-meta" title="${fntObj.name}">Font: ${fntObj.name}</div>
                <button class="button sm outline" style="width:100%; font-size: 0.75rem;" onclick="downloadSingle('${fntObj.url}', '${fntObj.filename}')">Download</button>
            `;
            imageGrid.appendChild(div);
        }

        // 5. Download Functions
        window.downloadSingle = (url, filename) => {
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        };

        downloadAllBtn.addEventListener('click', () => {
            if (extractedImages.length === 0 && extractedTexts.length === 0 && extractedFonts.length === 0) return;
            
            showToast('Zipping assets...', 'info');
            const zip = new JSZip();

            if (extractedImages.length > 0) {
                const imgFolder = zip.folder("extracted_images");
                extractedImages.forEach(img => imgFolder.file(img.filename, img.blob));
            }

            if (extractedTexts.length > 0) {
                const txtFolder = zip.folder("extracted_texts");
                extractedTexts.forEach(txt => txtFolder.file(txt.filename, txt.blob));
            }

            if (extractedFonts.length > 0) {
                const fntFolder = zip.folder("extracted_fonts");
                extractedFonts.forEach(fnt => fntFolder.file(fnt.filename, fnt.blob));
            }

            zip.generateAsync({ type: "blob" }).then(function(content) {
                saveAs(content, `assets_${currentFile.name.replace('.pdf', '')}.zip`);
                showToast('Download started!', 'success');
            });
        });

        // 6. Reset Logic
        resetBtn.addEventListener('click', resetTool);
        
        function resetTool() {
            const allAssets = [...extractedImages, ...extractedTexts, ...extractedFonts];
            if (allAssets.length > 0) {
                allAssets.forEach(asset => {
                    if (asset && asset.url) {
                        try { URL.revokeObjectURL(asset.url); } catch (e) {}
                    }
                });
            }
            currentFile = null;
            extractedImages = [];
            extractedTexts = [];
            extractedFonts = [];
            fileList.innerHTML = '';
            dropZone.classList.remove('hidden');
            controlPanel.classList.add('hidden');
            resultBox.classList.add('hidden');
            progressContainer.style.display = 'none';
            statusText.style.display = 'none';
            progressBar.style.width = '0%';
            fileInput.value = ''; // Clear input
        }
    </script>
</body>
</html>
