<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unit Converter | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    <style>
        /* Fix 1: Remove default number input spinners (arrows) */
        input[type=number]::-webkit-inner-spin-button, 
        input[type=number]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type=number] {
            -moz-appearance: textfield;
            appearance: textfield;
        }

        /* Fix 2: Custom Flex Layout to center the Equals sign correctly */
        .converter-layout {
            display: flex;
            align-items: center;
            gap: 2rem;
        }
        
        .input-group {
            flex: 1;
            width: 100%; /* Ensures inputs take full width inside flex item */
        }

        .equals-sign {
            font-size: 2rem;
            opacity: 0.5;
            padding-top: 1rem; /* Visual alignment with inputs */
            user-select: none;
        }

        /* Responsive: Stack vertically on mobile */
        @media (max-width: 768px) {
            .converter-layout {
                flex-direction: column;
                gap: 1rem;
            }
            .equals-sign {
                padding-top: 0;
                transform: rotate(90deg); /* Optional: rotates = to || if preferred, or keep as = */
            }
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>Unit Converter</h1>
                <p>Fast conversion for Length, Weight, Temperature, Speed, Data Storage, and Currency.</p>
            </div>

            <div class="card">
                
                <!-- Natural Language Quick Convert -->
                <div style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                    <label>Quick Convert (Type anywhere)</label>
                    <input type="text" id="nlpInput" placeholder="e.g., '5 km in miles' or '100 usd to eur'" style="width: 100%; font-size: 1.1rem; padding: 0.75rem;">
                </div>

                <!-- Category Selector -->
                <div style="margin-bottom: 2rem; border-bottom: 1px solid var(--border); padding-bottom: 1.5rem;">
                    <label>Category</label>
                    <div class="button-group">
                        <button class="button active-cat" onclick="setCategory('length')">Length</button>
                        <button class="button outline" onclick="setCategory('weight')">Weight</button>
                        <button class="button outline" onclick="setCategory('temp')">Temperature</button>
                        <button class="button outline" onclick="setCategory('speed')">Speed</button>
                        <button class="button outline" onclick="setCategory('data')">Data Storage</button>
                        <button class="button outline" onclick="setCategory('currency')">Currency</button>
                    </div>
                </div>

                <!-- Converter UI -->
                <div class="converter-layout">
                    
                    <!-- FROM (Left Side) -->
                    <div class="input-group">
                        <label>Value 1</label>
                        <input type="number" id="inputFrom" value="1" style="font-size: 1.5rem; font-family: var(--font-mono);">
                        <select id="unitFrom"></select>
                    </div>

                    <!-- EQUALS ICON -->
                    <div class="equals-sign">=</div>

                    <!-- TO (Right Side) -->
                    <div class="input-group">
                        <label>Value 2</label>
                        <input type="number" id="inputTo" style="font-size: 1.5rem; font-family: var(--font-mono);">
                        <select id="unitTo"></select>
                    </div>
                </div>

                <div id="currencyOptIn" style="display: none; margin-top: 2rem; padding-top: 1rem; border-top: 1px solid var(--border); text-align: center;">
                    <button class="button sm outline" id="fetchRatesBtn" onclick="fetchExchangeRates()">Fetch Live Currency Rates</button>
                    <p style="font-size: 0.8rem; color: var(--ink-secondary); margin-top: 0.5rem;">(Requires internet. Fetches from er-api.com and coincap.io)</p>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    <script>
        // Elements
        const nlpInput = document.getElementById('nlpInput');
        const inputFrom = document.getElementById('inputFrom');
        const inputTo = document.getElementById('inputTo');
        const unitFrom = document.getElementById('unitFrom');
        const unitTo = document.getElementById('unitTo');
        const catButtons = document.querySelectorAll('.button-group button');

        // Conversion Data
        const factors = {
            length: {
                base: 'm', // meters
                units: {
                    mm: 0.001,
                    cm: 0.01,
                    m: 1,
                    km: 1000,
                    in: 0.0254,
                    ft: 0.3048,
                    yd: 0.9144,
                    mi: 1609.344
                }
            },
            weight: {
                base: 'g', // grams
                units: {
                    mg: 0.001,
                    g: 1,
                    kg: 1000,
                    oz: 28.3495,
                    lb: 453.592
                }
            },
            speed: {
                base: 'm/s', // meters per second
                units: {
                    'm/s': 1,
                    'km/h': 0.27777778, // 1 km/h = 0.277 m/s
                    'mph': 0.44704,     // 1 mph = 0.447 m/s
                    'knots': 0.51444444,// 1 knot = 0.514 m/s
                    'ft/s': 0.3048      // 1 ft/s = 0.3048 m/s
                }
            },
            data: {
                base: 'MB', // megabytes
                units: {
                    B: 0.00000095367432,
                    KB: 0.0009765625,
                    MB: 1,
                    GB: 1024,
                    TB: 1048576
                }
            },
            currency: {
                base: 'USD',
                units: {
                    USD: 1,
                    EUR: 0.9,
                    GBP: 0.78,
                    JPY: 150,
                    CAD: 1.35,
                    AUD: 1.5,
                    CHF: 0.88,
                    CNY: 7.2,
                    INR: 83
                } // Will be updated via fetch
            }
        };

        let currentCategory = 'length';

        async function fetchExchangeRates() {
            const CACHE_KEY = 'linuli_currency_rates';
            const CACHE_TIME = 'linuli_currency_time';
            const ONE_HOUR = 60 * 60 * 1000;
            const now = Date.now();

            try {
                // Check cache
                const cachedTime = localStorage.getItem(CACHE_TIME);
                if (cachedTime && (now - cachedTime < ONE_HOUR)) {
                    const cachedRates = localStorage.getItem(CACHE_KEY);
                    if (cachedRates) {
                        const parsed = JSON.parse(cachedRates);
                        factors.currency.units = parsed;
                        if (currentCategory === 'currency') populateSelects();
                        return;
                    }
                }

                // Fetch real-time Fiat rates (USD base)
                const fiatRes = await fetch('https://open.er-api.com/v6/latest/USD');
                const fiatData = await fiatRes.json();

                // Fetch real-time Crypto rates (USD base)
                const cryptoRes = await fetch('https://api.coincap.io/v2/assets?limit=20');
                const cryptoData = await cryptoRes.json();

                if (fiatData && fiatData.rates && cryptoData && cryptoData.data) {
                    const newRates = { ...factors.currency.units }; // Keep defaults as fallback base

                    // Add Fiat
                    Object.keys(fiatData.rates).forEach(currency => {
                        newRates[currency] = fiatData.rates[currency];
                    });

                    // Add Crypto
                    cryptoData.data.forEach(coin => {
                        // Exchangerate-api gives us units per 1 USD (e.g. 1 USD = 0.9 EUR)
                        // Coincap gives us USD per 1 unit (e.g. 1 BTC = 50000 USD)
                        // So to get units per 1 USD, we invert it: 1 / priceUsd
                        const priceUsd = parseFloat(coin.priceUsd);
                        if (priceUsd > 0) {
                            newRates[coin.symbol] = 1 / priceUsd;
                        }
                    });

                    factors.currency.units = newRates;
                    localStorage.setItem(CACHE_KEY, JSON.stringify(newRates));
                    localStorage.setItem(CACHE_TIME, now.toString());

                    if (currentCategory === 'currency') {
                        populateSelects();
                        convert('from');
                    }
                }
            } catch (error) {
                console.error("Failed to fetch exchange rates. Using default fallbacks.", error);
            }
        }

        // --- 1. Logic ---
        function setCategory(cat) {
            currentCategory = cat;
            
            document.getElementById('currencyOptIn').style.display = (cat === 'currency') ? 'block' : 'none';
            
            // Update Buttons Highlighting
            catButtons.forEach(btn => {
                // Simple matching to find which button was clicked based on text content vs category name
                const btnText = btn.textContent.toLowerCase();
                const isMatch = (cat === 'data' && btnText.includes('data')) || 
                                (cat === 'speed' && btnText.includes('speed')) ||
                                (cat === 'temp' && btnText.includes('temp')) ||
                                (cat === 'currency' && btnText.includes('currency')) ||
                                (btnText.startsWith(cat.substring(0,3)));
                                
                if(isMatch) {
                    btn.classList.remove('outline');
                } else {
                    btn.classList.add('outline');
                }
            });

            populateSelects();
            convert('from'); // Default update direction
        }

        function populateSelects() {
            unitFrom.innerHTML = '';
            unitTo.innerHTML = '';

            if (currentCategory === 'temp') {
                const units = ['Celsius (°C)', 'Fahrenheit (°F)', 'Kelvin (K)'];
                units.forEach(u => {
                    unitFrom.add(new Option(u, u));
                    unitTo.add(new Option(u, u));
                });
                unitTo.selectedIndex = 1; // Default to C -> F
            } else {
                const units = Object.keys(factors[currentCategory].units);
                units.forEach(u => {
                    unitFrom.add(new Option(u, u));
                    unitTo.add(new Option(u, u));
                });
                
                // Smart defaults
                if(currentCategory === 'length') { unitFrom.value = 'm'; unitTo.value = 'ft'; }
                if(currentCategory === 'weight') { unitFrom.value = 'kg'; unitTo.value = 'lb'; }
                if(currentCategory === 'speed')  { unitFrom.value = 'km/h'; unitTo.value = 'mph'; }
                if(currentCategory === 'data')   { unitFrom.value = 'MB'; unitTo.value = 'GB'; }
                if(currentCategory === 'currency') { unitFrom.value = 'USD'; unitTo.value = 'EUR'; }
            }
        }

        /**
         * Handles bidirectional conversion.
         * @param {string} direction - 'from' (Left->Right) or 'to' (Right->Left)
         */
        function convert(direction) {
            let val, outputEl, u1, u2;

            if (direction === 'to') {
                // Converting Right -> Left
                val = parseFloat(inputTo.value);
                outputEl = inputFrom;
                u1 = unitTo.value;   // Source Unit
                u2 = unitFrom.value; // Target Unit
            } else {
                // Converting Left -> Right (Default)
                val = parseFloat(inputFrom.value);
                outputEl = inputTo;
                u1 = unitFrom.value; // Source Unit
                u2 = unitTo.value;   // Target Unit
            }

            if (isNaN(val)) {
                outputEl.value = '';
                return;
            }

            if (currentCategory === 'temp') {
                const result = convertTemp(val, u1, u2);
                outputEl.value = result;

                // If clamped, reflect it back to input so user sees
                // Check if val was less than absolute zero by comparing the inverse conversion
                const originalClamped = convertTemp(result, u2, u1);
                if (Math.abs(val - originalClamped) > 0.01 && val < originalClamped) {
                     if (direction === 'to') {
                         inputTo.value = originalClamped;
                     } else {
                         inputFrom.value = originalClamped;
                     }
                }
            } else {
                // Non-temp categories cannot be negative
                if (val < 0) {
                    val = 0;
                    if (direction === 'to') inputTo.value = 0;
                    else inputFrom.value = 0;
                }

                // Base unit conversion
                const catData = factors[currentCategory];
                let result;
                if (currentCategory === 'currency') {
                    // Currency rates are usually units per 1 USD (base = USD)
                    // So to convert: divide by source rate to get USD, then multiply by target rate
                    const baseValue = val / catData.units[u1];
                    result = baseValue * catData.units[u2];
                } else {
                    const baseValue = val * catData.units[u1]; // Convert source to base
                    result = baseValue / catData.units[u2]; // Convert base to target
                }
                
                // Format appropriately for extreme and normal values
                outputEl.value = formatNumber(result);
            }
        }

        function formatNumber(num) {
            // Fix floating point issues for display (e.g. 0.1 + 0.2)
            if (Math.abs(num) < 1e-10) return "0";

            let str = num.toPrecision(10);
            return parseFloat(str).toString();
        }

        function convertTemp(val, from, to) {
            // 1. Normalize source to Celsius
            let c = val;
            if (from.includes('Fahrenheit')) c = (val - 32) * 5/9;
            if (from.includes('Kelvin')) c = val - 273.15;

            // Enforce Absolute Zero Limit (-273.15 °C)
            if (c < -273.15) {
                c = -273.15;
            }

            // 2. Convert Celsius to Target
            if (to.includes('Celsius')) return formatNumber(c);
            if (to.includes('Fahrenheit')) return formatNumber(c * 9/5 + 32);
            if (to.includes('Kelvin')) return formatNumber(c + 273.15);
        }

        // --- 2. Event Listeners ---
        
        // Typing in Left Box -> Update Right
        inputFrom.addEventListener('input', () => convert('from'));
        
        // Typing in Right Box -> Update Left
        inputTo.addEventListener('input', () => convert('to'));
        
        // Changing Units -> Update based on which side changed
        // If left unit changes, re-calculate Right based on Left
        unitFrom.addEventListener('change', () => convert('from'));
        // If right unit changes, re-calculate Right based on Left (keep input logic consistent)
        unitTo.addEventListener('change', () => convert('from'));

        // --- 3. Natural Language Processing ---
        const synonymDict = {
            'm': ['m', 'meter', 'meters'],
            'km': ['km', 'kilometer', 'kilometers'],
            'mm': ['mm', 'millimeter', 'millimeters'],
            'cm': ['cm', 'centimeter', 'centimeters'],
            'in': ['in', 'inch', 'inches'],
            'ft': ['ft', 'foot', 'feet'],
            'yd': ['yd', 'yard', 'yards'],
            'mi': ['mi', 'mile', 'miles'],

            'g': ['g', 'gram', 'grams'],
            'kg': ['kg', 'kilo', 'kilogram', 'kilograms'],
            'mg': ['mg', 'milligram', 'milligrams'],
            'oz': ['oz', 'ounce', 'ounces'],
            'lb': ['lb', 'lbs', 'pound', 'pounds'],

            'Celsius (°C)': ['c', 'celsius', '°c'],
            'Fahrenheit (°F)': ['f', 'fahrenheit', '°f'],
            'Kelvin (K)': ['k', 'kelvin'],

            'm/s': ['m/s', 'mps', 'meters per second'],
            'km/h': ['km/h', 'kph', 'kilometers per hour'],
            'mph': ['mph', 'miles per hour'],
            'knots': ['knots', 'knot'],
            'ft/s': ['ft/s', 'fps', 'feet per second'],

            'B': ['b', 'byte', 'bytes'],
            'KB': ['kb', 'kilobyte', 'kilobytes'],
            'MB': ['mb', 'megabyte', 'megabytes'],
            'GB': ['gb', 'gigabyte', 'gigabytes'],
            'TB': ['tb', 'terabyte', 'terabytes']
        };

        function parseNLP(inputStr) {
            if (!inputStr) return;
            // Match pattern like "5 km to miles" or "100.5 USD in EUR"
            const match = inputStr.trim().match(/^([\d\.]+)\s+(.+?)\s+(?:in|to)\s+(.+)$/i);
            if (!match) return;

            const val = parseFloat(match[1]);
            if (isNaN(val)) return;

            let sourceStr = match[2].toLowerCase();
            let targetStr = match[3].toLowerCase();

            let foundCat = null;
            let foundU1 = null;
            let foundU2 = null;

            // Search for matches in synonym dictionary and currency keys
            const findUnitKey = (query) => {
                // Check synonym dictionary
                for (const [key, synonyms] of Object.entries(synonymDict)) {
                    if (synonyms.includes(query)) return key;
                }

                // Fallback: check dynamic currency keys directly
                const upperQuery = query.toUpperCase();
                if (factors.currency.units[upperQuery]) {
                    return upperQuery;
                }

                return null;
            };

            foundU1 = findUnitKey(sourceStr);
            foundU2 = findUnitKey(targetStr);

            if (foundU1 && foundU2) {
                // Find category
                for (const cat of Object.keys(factors)) {
                    if (cat === 'temp') {
                         if (foundU1.includes('Celsius') || foundU1.includes('Fahrenheit') || foundU1.includes('Kelvin')) {
                             foundCat = 'temp'; break;
                         }
                    } else if (factors[cat].units[foundU1]) {
                        foundCat = cat;
                        break;
                    }
                }

                // Apply update if both units are in the same category
                if (foundCat && factors[foundCat]) {
                    let u2IsValid = false;
                    if (foundCat === 'temp') {
                        u2IsValid = foundU2.includes('Celsius') || foundU2.includes('Fahrenheit') || foundU2.includes('Kelvin');
                    } else {
                        u2IsValid = !!factors[foundCat].units[foundU2];
                    }

                    if (u2IsValid) {
                        if (currentCategory !== foundCat) {
                            setCategory(foundCat);
                        }
                        inputFrom.value = val;
                        unitFrom.value = foundU1;
                        unitTo.value = foundU2;
                        convert('from');
                    }
                }
            }
        }

        nlpInput.addEventListener('input', (e) => {
            parseNLP(e.target.value);
        });

        // Init
        setCategory('length');
    </script>
</body>
</html>
