<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Password Generator | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    <style>
        .password-display {
            font-family: var(--font-mono);
            font-size: 1.5rem;
            background: var(--code-bg);
            padding: 1.5rem;
            border-radius: 4px;
            border: 1px solid var(--border);
            word-break: break-all;
            text-align: center;
            margin-bottom: 1rem;
            position: relative;
            min-height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .strength-bar {
            height: 6px;
            background: #eee;
            border-radius: 3px;
            margin-bottom: 2rem;
            overflow: hidden;
        }
        .strength-fill {
            height: 100%;
            width: 0%;
            transition: width 0.3s, background 0.3s;
        }
        /* Colors for strength */
        .weak { background: var(--accent); width: 30%; }
        .medium { background: #e6c229; width: 60%; }
        .strong { background: var(--accent-secondary); width: 100%; }
    </style>
</head>
<body>
    <main>
        <div class="container" style="max-width: 800px;">
            <div class="tool-header">
                <h1>Password Generator</h1>
                <p>Create strong, secure passwords instantly in your browser.</p>
            </div>

            <div class="card">
                
                <!-- DISPLAY -->
                <div class="password-display" id="passwordOutput">Generate to start...</div>
                
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthMeter"></div>
                </div>

                <div class="button-group" style="justify-content: center; margin-bottom: 2rem;">
                    <button class="button" id="generateBtn">Generate New</button>
                    <button class="button secondary" id="copyBtn">Copy Password</button>
                </div>

                <!-- SETTINGS -->
                <div style="border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <div style="display: flex; gap: 1rem; margin-bottom: 1.5rem; justify-content: center;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="mode" value="characters" checked id="modeChars">
                            Random Characters
                        </label>
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="radio" name="mode" value="passphrase" id="modePassphrase">
                            Memorable Passphrase
                        </label>
                    </div>

                    <div id="settingsChars">
                        <label for="lengthRange">Length: <span id="lengthValue" style="color: var(--accent);">16</span></label>
                        <input type="range" id="lengthRange" min="6" max="64" value="16">

                        <div class="split-view" style="margin-top: 1.5rem;">
                            <div>
                                <label class="toggle-wrapper">
                                <input type="checkbox" id="chkUppercase" class="toggle-checkbox" checked>
                                <div class="toggle-switch"></div>
                                <span>Uppercase (A-Z)</span>
                            </label>
                            <label class="toggle-wrapper">
                                <input type="checkbox" id="chkLowercase" class="toggle-checkbox" checked>
                                <div class="toggle-switch"></div>
                                <span>Lowercase (a-z)</span>
                            </label>
                            <label class="toggle-wrapper">
                                <input type="checkbox" id="chkNumbers" class="toggle-checkbox" checked>
                                <div class="toggle-switch"></div>
                                <span>Numbers (0-9)</span>
                            </label>
                        </div>
                            <div>
                                <label class="toggle-wrapper">
                                    <input type="checkbox" id="chkSymbols" class="toggle-checkbox" checked>
                                    <div class="toggle-switch"></div>
                                    <span>Symbols (!@#$)</span>
                                </label>
                                <label class="toggle-wrapper">
                                    <input type="checkbox" id="chkAmbiguous" class="toggle-checkbox">
                                    <div class="toggle-switch"></div>
                                    <span>No Ambiguous (l, 1, O, 0)</span>
                                </label>
                            </div>
                        </div>
                    </div>

                    <div id="settingsPassphrase" style="display: none;">
                        <label for="wordsRange">Words: <span id="wordsValue" style="color: var(--accent);">4</span></label>
                        <input type="range" id="wordsRange" min="3" max="12" value="4">

                        <div style="margin-top: 1.5rem;">
                            <label for="separatorSelect" style="display: block; margin-bottom: 0.5rem;">Separator:</label>
                            <select id="separatorSelect" style="width: 100%; padding: 0.75rem; border: 1px solid var(--border); border-radius: 4px; font-family: var(--font-body); background: var(--input-bg); color: var(--input-text);">
                                <option value="-">Hyphen (-)</option>
                                <option value="_">Underscore (_)</option>
                                <option value=".">Period (.)</option>
                                <option value=" ">Space</option>
                            </select>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    <script src="words.js"></script>
    <script>
        // Elements
        const output = document.getElementById('passwordOutput');
        const strengthMeter = document.getElementById('strengthMeter');
        const lengthRange = document.getElementById('lengthRange');
        const lengthValue = document.getElementById('lengthValue');
        const wordsRange = document.getElementById('wordsRange');
        const wordsValue = document.getElementById('wordsValue');
        const separatorSelect = document.getElementById('separatorSelect');
        const modeChars = document.getElementById('modeChars');
        const modePassphrase = document.getElementById('modePassphrase');
        const settingsChars = document.getElementById('settingsChars');
        const settingsPassphrase = document.getElementById('settingsPassphrase');
        const generateBtn = document.getElementById('generateBtn');
        const copyBtn = document.getElementById('copyBtn');

        // Checkboxes
        const chkUpper = document.getElementById('chkUppercase');
        const chkLower = document.getElementById('chkLowercase');
        const chkNum = document.getElementById('chkNumbers');
        const chkSym = document.getElementById('chkSymbols');
        const chkAmbiguous = document.getElementById('chkAmbiguous');

        // Charsets
        const charsUpper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
        const charsLower = "abcdefghijklmnopqrstuvwxyz";
        const charsNum = "0123456789";
        const charsSym = "!@#$%^&*()_+~`|}{[]:;?><,./-=";
        const ambiguous = "Il1O0";

        function getSecureRandomWord(wordlist) {
            const maxValid = 4294967295 - (4294967295 % wordlist.length);
            const array = new Uint32Array(1);
            let rand;
            do {
                window.crypto.getRandomValues(array);
                rand = array[0];
            } while (rand >= maxValid);
            return wordlist[rand % wordlist.length];
        }

        function generate() {
            if (!window.crypto || !window.crypto.getRandomValues) {
                output.textContent = "Cryptographic randomness unavailable.";
                strengthMeter.className = "strength-fill weak";
                return;
            }

            const isPassphrase = modePassphrase.checked;
            let password = "";

            if (isPassphrase) {
                let wordCount = parseInt(wordsRange.value, 10);
                if (isNaN(wordCount) || wordCount < 1) {
                    output.textContent = "Word count must be at least 1.";
                    strengthMeter.className = "strength-fill";
                    return;
                }
                const separator = separatorSelect.value;
                const words = [];
                try {
                    for (let i = 0; i < wordCount; i++) {
                        words.push(getSecureRandomWord(bip39Words));
                    }
                    password = words.join(separator);
                } catch (err) {
                    output.textContent = "Error generating passphrase.";
                    strengthMeter.className = "strength-fill weak";
                    return;
                }
            } else {
                let length = parseInt(lengthRange.value, 10);

                if (isNaN(length) || length <= 0) {
                    output.textContent = "Length must be greater than 0.";
                    strengthMeter.className = "strength-fill";
                    return;
                }
                if (length > 2048) {
                    length = 2048; // Cap length to avoid browser freezing and quota issues
                }

                let charset = "";

                if (chkUpper.checked) charset += charsUpper;
                if (chkLower.checked) charset += charsLower;
                if (chkNum.checked) charset += charsNum;
                if (chkSym.checked) charset += charsSym;

                // Remove ambiguous if requested
                if (chkAmbiguous.checked) {
                    for (let char of ambiguous) {
                        charset = charset.split(char).join('');
                    }
                }

                if (charset === "") {
                    output.textContent = "Please select at least one option.";
                    strengthMeter.className = "strength-fill";
                    return;
                }

                try {
                    const maxValid = 4294967295 - (4294967295 % charset.length); // 2^32 - 1
                    const array = new Uint32Array(1);
                    for (let i = 0; i < length; i++) {
                        let rand;
                        do {
                            window.crypto.getRandomValues(array);
                            rand = array[0];
                        } while (rand >= maxValid);
                        password += charset[rand % charset.length];
                    }
                } catch (err) {
                    output.textContent = "Error generating password.";
                    strengthMeter.className = "strength-fill weak";
                    return;
                }
            }

            output.textContent = password;
            calcStrength(password, isPassphrase);
        }

        function calcStrength(pw, isPassphrase) {
            let score = 0;

            if (isPassphrase) {
                // Passphrase strength based on bits of entropy (each word is 11 bits in BIP39)
                const wordCount = parseInt(wordsRange.value, 10);
                const entropy = wordCount * 11;

                if (entropy >= 44) score += 3; // Strong (e.g. 4+ words)
                else if (entropy >= 33) score += 2; // Medium (e.g. 3 words)
                else score += 1; // Weak
            } else {
                // Simple heuristic for characters
                if (pw.length > 8) score++;
                if (pw.length > 12) score++;
                if (/[A-Z]/.test(pw)) score++;
                if (/[0-9]/.test(pw)) score++;
                if (/[^A-Za-z0-9]/.test(pw)) score++;
            }

            strengthMeter.className = "strength-fill";
            
            if (score < 3) strengthMeter.classList.add("weak");
            else if (score < 5) strengthMeter.classList.add("medium");
            else strengthMeter.classList.add("strong");
        }

        // Event Listeners
        [modeChars, modePassphrase].forEach(el => {
            el.addEventListener('change', () => {
                if (modeChars.checked) {
                    settingsChars.style.display = 'block';
                    settingsPassphrase.style.display = 'none';
                } else {
                    settingsChars.style.display = 'none';
                    settingsPassphrase.style.display = 'block';
                }
                generate();
            });
        });

        lengthRange.addEventListener('input', (e) => {
            lengthValue.textContent = e.target.value;
            generate();
        });

        wordsRange.addEventListener('input', (e) => {
            wordsValue.textContent = e.target.value;
            generate();
        });

        separatorSelect.addEventListener('change', generate);

        [chkUpper, chkLower, chkNum, chkSym, chkAmbiguous].forEach(el => {
            el.addEventListener('change', generate);
        });

        generateBtn.addEventListener('click', generate);
        
        copyBtn.addEventListener('click', () => {
            const text = output.textContent;
            if (text &&
                !text.includes('Please select') &&
                text !== 'Length must be greater than 0.' &&
                text !== 'Error generating password.' &&
                text !== 'Generate to start...') {
                copyToClipboard(text);
            }
        });

        // Init
        generate();

    </script>
</body>
</html>
