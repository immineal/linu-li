<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Encoder/Decoder | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>URL Encoder/Decoder</h1>
                <p>Fix messy URLs, encode for code, or strip tracking parameters to get the shortest link.</p>
            </div>

            <div class="card">
                
                <label for="inputData">Input Text / URL</label>
                <textarea id="inputData" class="code-editor" placeholder="Paste URL here (e.g., https://www.amazon.com/product-name/dp/B00...ref=xyz)..."></textarea>
                
                <div class="button-group">
                    <button class="button secondary" id="cleanBtn" title="Detects Amazon, eBay, YouTube, etc.">Clean & Minify</button>
                    <button class="button outline" id="decodeBtn" title="Convert %20 to spaces, etc.">Decode</button>
                    <button class="button outline" id="encodeBtn" title="Convert special chars to % codes">Encode</button>
                    <button class="button outline" id="clearBtn" style="margin-left: auto;">Clear</button>
                </div>

                <div class="result-box hidden" id="resultBox">
                    <label style="margin-bottom: 0.5rem; display: block;">Result</label>
                    
                    <div id="textOutput" 
                         style="min-height: 50px; 
                                font-family: var(--font-mono); 
                                background: var(--code-bg); 
                                padding: 1rem; 
                                border-radius: 4px; 
                                white-space: pre-wrap; 
                                word-break: break-all; 
                                overflow-wrap: anywhere;"></div>

                    <div id="paramsContainer" class="hidden"></div>
                    
                    <div class="button-group" style="margin-top: 1rem;">
                        <button class="button sm secondary" id="copyBtn">Copy Result</button>
                        <button class="button sm outline" id="shareBtn" title="Create a link with this result pre-filled">Share Link</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // DOM Elements
            const inputData = document.getElementById('inputData');
            const cleanBtn = document.getElementById('cleanBtn');
            const decodeBtn = document.getElementById('decodeBtn');
            const encodeBtn = document.getElementById('encodeBtn');
            const clearBtn = document.getElementById('clearBtn');
            const resultBox = document.getElementById('resultBox');
            const textOutput = document.getElementById('textOutput');
            const copyBtn = document.getElementById('copyBtn');
            const shareBtn = document.getElementById('shareBtn');

            // Helper to display results
            function displayResult(text) {
                if (!text) {
                    resultBox.classList.add('hidden');
                    return;
                }
                textOutput.textContent = text;
                resultBox.classList.remove('hidden');
            }

            // === LOAD FROM HASH (Sharing Logic) ===
            if (window.location.hash && window.location.hash.startsWith('#data=')) {
                try {
                    const rawHash = window.location.hash.substring(6); // remove #data=
                    const decodedContent = decodeURIComponent(rawHash);
                    
                    // Populate input and show result immediately
                    inputData.value = decodedContent;
                    displayResult(decodedContent);
                    
                    showToast('Shared content loaded', 'info');
                    
                    // Clean URL (remove hash) without page refresh so it looks clean
                    history.replaceState(null, null, ' ');
                } catch (e) {
                    console.error('Failed to parse share link', e);
                }
            }

            // Aggressive parameter removal list (100+ params)
            const paramsToRemove = new Set([
                'utm_source', 'utm_medium', 'utm_campaign', 'utm_term', 'utm_content', 'utm_cid', 'utm_reader', 'utm_referrer', 'utm_name', 'utm_social', 'utm_social-type', 'utm_id',
                'fbclid', 'gclid', 'igshid', '_hsenc', '_hsmi', 'mc_cid', 'mc_eid', 'mkt_tok', 'yclid', '_openstat', 'wt_mc', 'twclid', 'msclkid', 'dclid', 'wbraid', 'gbraid',
                'oly_anon_id', 'oly_enc_id', '__s', '_bta_tid', '_bta_c', 'trk_contact', 'trk_msg', 'trk_module', 'trk_sid',
                'pd_rd_r', 'pd_rd_w', 'pd_rd_wg', 'pf_rd_p', 'pf_rd_r', 'pf_rd_s', 'pf_rd_t', 'pf_rd_i', 'pf_rd_m', 'ref', 'ref_', 'sr_share', 'si', 's', '_t', '_r', 'share_id', 'feature', 'context', 'smid', 'cmpid',
                'cj1', 'rv1', 'nb', 'p', 'b', 'z', 'm', 'n', 'k', 'c', 'clid', 'qid', 'sr', 'dchild', 'keywords'
            ]);

            // Define UI rendering function for params editor
            function renderParamsEditor(urlStr) {
                const container = document.getElementById('paramsContainer');
                if (!container) return;

                try {
                    const url = new URL(urlStr);
                    const params = Array.from(url.searchParams.entries());

                    if (params.length === 0) {
                        container.innerHTML = '';
                        container.classList.add('hidden');
                        return;
                    }

                    container.classList.remove('hidden');
                    container.innerHTML = `<h3 style="margin-bottom: 0.5rem; font-size: 1rem; margin-top: 1rem;">Query Parameters</h3>
                                <table style="width: 100%; border-collapse: collapse; margin-bottom: 1rem; font-family: var(--font-mono); font-size: 0.85rem;">
                                    <thead>
                                        <tr style="border-bottom: 1px solid var(--border); text-align: left;">
                                            <th style="padding: 0.5rem; width: 35%;">Key</th>
                                            <th style="padding: 0.5rem; width: 55%;">Value</th>
                                            <th style="padding: 0.5rem; width: 10%;"></th>
                                        </tr>
                                    </thead>
                                    <tbody id="paramsTableBody"></tbody>
                                </table>
                                <button id="addParamBtn" class="button sm outline" style="margin-bottom: 1rem;">+ Add Parameter</button>`;

                    const tbody = container.querySelector('#paramsTableBody');

                    params.forEach(([key, val], index) => {
                        const tr = document.createElement('tr');
                        tr.style.borderBottom = '1px solid var(--border)';

                        const tdKey = document.createElement('td');
                        tdKey.style.padding = '0.5rem';
                        const inputKey = document.createElement('input');
                        inputKey.type = 'text';
                        inputKey.className = 'param-key';
                        inputKey.dataset.index = index;
                        inputKey.value = key;
                        inputKey.style.cssText = 'width: 100%; padding: 0.25rem; font-family: inherit; border: 1px solid transparent; background: transparent;';
                        tdKey.appendChild(inputKey);

                        const tdVal = document.createElement('td');
                        tdVal.style.padding = '0.5rem';
                        const inputVal = document.createElement('input');
                        inputVal.type = 'text';
                        inputVal.className = 'param-val';
                        inputVal.dataset.index = index;
                        inputVal.value = val;
                        inputVal.style.cssText = 'width: 100%; padding: 0.25rem; font-family: inherit; border: 1px solid transparent; background: transparent;';
                        tdVal.appendChild(inputVal);

                        const tdBtn = document.createElement('td');
                        tdBtn.style.padding = '0.5rem';
                        tdBtn.style.textAlign = 'center';
                        const btn = document.createElement('button');
                        btn.className = 'delete-param';
                        btn.dataset.index = index;
                        btn.style.cssText = 'background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2rem;';
                        btn.innerHTML = '&times;';
                        tdBtn.appendChild(btn);

                        tr.appendChild(tdKey);
                        tr.appendChild(tdVal);
                        tr.appendChild(tdBtn);

                        tbody.appendChild(tr);
                    });

                    // Attach event listeners for inputs and deletes
                    const inputs = container.querySelectorAll('input');
                    inputs.forEach(input => {
                        input.addEventListener('input', () => updateUrlFromParams(urlStr));
                        input.addEventListener('focus', function() { this.style.border = '1px solid var(--border)'; this.style.background = 'var(--input-bg)'; });
                        input.addEventListener('blur', function() { this.style.border = '1px solid transparent'; this.style.background = 'transparent'; });
                    });

                    const deletes = container.querySelectorAll('.delete-param');
                    deletes.forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            e.target.closest('tr').remove();
                            updateUrlFromParams(urlStr);
                        });
                    });

                    const addBtn = container.querySelector('#addParamBtn');
                    if(addBtn) {
                        addBtn.addEventListener('click', () => {
                            const tbody = container.querySelector('#paramsTableBody');
                            const newIdx = tbody.children.length;
                            const tr = document.createElement('tr');
                            tr.style.borderBottom = '1px solid var(--border)';
                            tr.innerHTML = `
                                <td style="padding: 0.5rem;"><input type="text" class="param-key" data-index="${newIdx}" placeholder="key" style="width: 100%; padding: 0.25rem; font-family: inherit; border: 1px solid var(--border); background: var(--input-bg);" /></td>
                                <td style="padding: 0.5rem;"><input type="text" class="param-val" data-index="${newIdx}" placeholder="value" style="width: 100%; padding: 0.25rem; font-family: inherit; border: 1px solid var(--border); background: var(--input-bg);" /></td>
                                <td style="padding: 0.5rem; text-align: center;"><button class="delete-param" data-index="${newIdx}" style="background: none; border: none; color: var(--accent); cursor: pointer; font-size: 1.2rem;">&times;</button></td>
                            `;
                            tbody.appendChild(tr);

                            // Attach events to new elements
                            const newInputs = tr.querySelectorAll('input');
                            newInputs.forEach(input => {
                                input.addEventListener('input', () => updateUrlFromParams(urlStr));
                                input.addEventListener('focus', function() { this.style.border = '1px solid var(--border)'; this.style.background = 'var(--input-bg)'; });
                                input.addEventListener('blur', function() { this.style.border = '1px solid transparent'; this.style.background = 'transparent'; });
                            });
                            tr.querySelector('.delete-param').addEventListener('click', (e) => {
                                e.target.closest('tr').remove();
                                updateUrlFromParams(urlStr);
                            });

                            // focus first input
                            tr.querySelector('.param-key').focus();
                        });
                    }

                } catch(e) {
                    console.error("Error rendering params editor:", e);
                    container.innerHTML = '';
                    container.classList.add('hidden');
                }
            }

            function updateUrlFromParams(originalUrlStr) {
                try {
                    const url = new URL(originalUrlStr);
                    // Clear existing params
                    url.search = '';

                    const container = document.getElementById('paramsContainer');
                    if (container) {
                        const rows = container.querySelectorAll('tbody tr');
                        rows.forEach(row => {
                            const keyInput = row.querySelector('.param-key');
                            const valInput = row.querySelector('.param-val');
                            if (keyInput && valInput && keyInput.value.trim() !== '') {
                                url.searchParams.append(keyInput.value.trim(), valInput.value);
                            }
                        });
                    }

                    // Update the display result without triggering a full re-render of the table
                    const finalStr = url.toString();
                    textOutput.textContent = finalStr;
                    resultBox.classList.remove('hidden');

                } catch(e) {
                    console.error("Error updating URL:", e);
                }
            }

            // === ADVANCED CLEANING LOGIC ===
            cleanBtn.addEventListener('click', () => {
                let rawLines = inputData.value.trim().split('\n').filter(line => line.trim() !== '');
                if (rawLines.length === 0) {
                    showToast('Please enter a URL', 'info');
                    return;
                }

                let finalUrls = [];
                let overallPlatformDetected = null;
                let hasErrors = false;

                rawLines.forEach(raw => {
                    raw = raw.trim();

                    // If user pasted a massive encoded block, decode it recursively (up to 5 times for safety)
                    let prevRaw = '';
                    let decodeAttempts = 0;
                    while (raw !== prevRaw && decodeAttempts < 5) {
                        prevRaw = raw;
                        if (raw.includes('%')) {
                            try { raw = decodeURIComponent(raw); } catch (e) { break; }
                        }
                        decodeAttempts++;
                    }

                    // Prepend protocol if missing so new URL() doesn't throw
                    if (!/^https?:\/\//i.test(raw)) {
                        raw = 'https://' + raw;
                    }

                    try {
                        const url = new URL(raw);
                        const hostname = url.hostname.toLowerCase();
                        let finalUrl = url.toString();
                        let platformDetected = null;

                        // 1. AMAZON (dp/ASIN)
                        if (hostname.includes('amazon') || hostname.includes('amzn')) {
                            const asinMatch = url.pathname.match(/\/(?:dp|gp\/product|exec\/obidos\/asin)\/([A-Z0-9]{10})/);
                            if (asinMatch) {
                                finalUrl = `https://${hostname}/dp/${asinMatch[1]}`;
                                if (url.hash) finalUrl += url.hash;
                                platformDetected = 'Amazon';
                            }
                        }

                        // 2. EBAY (itm/ID)
                        else if (hostname.includes('ebay')) {
                            // eBay URLs are usually ebay.com/itm/TITLE-SLUG/12345678
                            const itemMatch = url.pathname.match(/\/itm\/(?:.*\/)?(\d+)/);
                            if (itemMatch) {
                                finalUrl = `https://${hostname}/itm/${itemMatch[1]}`;
                                if (url.hash) finalUrl += url.hash;
                                platformDetected = 'eBay';
                            }
                        }

                        // 3. YOUTUBE (ConvertTo youtu.be/ID)
                        else if (hostname.includes('youtube.com') || hostname.includes('youtu.be')) {
                            let videoId = null;
                            if (hostname.includes('youtu.be')) {
                                videoId = url.pathname.substring(1);
                            } else if (url.searchParams.has('v')) {
                                videoId = url.searchParams.get('v');
                            }

                            if (videoId) {
                                finalUrl = `https://youtu.be/${videoId}`;
                                // Preserve timestamp if present
                                if (url.searchParams.has('t')) {
                                    finalUrl += `?t=${url.searchParams.get('t')}`;
                                }
                                if (url.hash) finalUrl += url.hash;
                                platformDetected = 'YouTube';
                            }
                        }

                        // 4. TWITTER / X (Status ID only)
                        else if (hostname.includes('twitter.com') || hostname.includes('x.com')) {
                            const statusMatch = url.pathname.match(/\/status\/(\d+)/);
                            if (statusMatch) {
                                // Normalize to x.com as it's shorter/current
                                finalUrl = `https://x.com${url.pathname.split('/status/')[0]}/status/${statusMatch[1]}`;
                                if (url.hash) finalUrl += url.hash;
                                platformDetected = 'X / Twitter';
                            }
                        }

                        // 5. GENERIC CLEANER (If no specific platform matched, or to clean remaining params)
                        if (!platformDetected) {
                            // Create a temporary URL object to strip params
                            const tempUrl = new URL(finalUrl);

                            // Delete known tracking parameters
                            const keysToDelete = [];
                            for (const key of tempUrl.searchParams.keys()) {
                                if (paramsToRemove.has(key.toLowerCase())) {
                                    keysToDelete.push(key);
                                }
                            }
                            keysToDelete.forEach(k => tempUrl.searchParams.delete(k));

                            finalUrl = tempUrl.toString();
                        }

                        if (platformDetected) {
                            overallPlatformDetected = platformDetected;
                        }

                        finalUrls.push(finalUrl);

                    } catch (e) {
                        hasErrors = true;
                        finalUrls.push(raw + " (Invalid URL)");
                    }
                });

                const finalStr = finalUrls.join('\n');
                displayResult(finalStr);

                // Hide params container by default on clean, we'll render it only for single URLs
                const paramsContainer = document.getElementById('paramsContainer');
                if (paramsContainer) {
                    paramsContainer.innerHTML = '';
                    paramsContainer.classList.add('hidden');
                    
                    // Render editable params only if there's exactly 1 valid URL
                    if (finalUrls.length === 1 && !hasErrors) {
                        renderParamsEditor(finalUrls[0]);
                    }
                }

                if (hasErrors && finalUrls.length === 1) {
                    showToast('Input is not a valid URL', 'error');
                } else if (hasErrors) {
                    showToast('Processed with some errors', 'warning');
                } else if (finalUrls.length > 1) {
                    showToast(`Cleaned ${finalUrls.length} URLs!`, 'success');
                } else if (overallPlatformDetected) {
                    showToast(`${overallPlatformDetected} link minified!`, 'success');
                } else {
                    showToast('Tracking parameters removed', 'success');
                }
            });

            // Decode Logic
            decodeBtn.addEventListener('click', () => {
                const raw = inputData.value.trim();
                if (!raw) return;
                try {
                    displayResult(decodeURIComponent(raw));
                    showToast('Decoded', 'success');
                } catch (e) { showToast('Invalid encoding', 'error'); }
            });

            // Encode Logic
            encodeBtn.addEventListener('click', () => {
                const raw = inputData.value.trim();
                if (!raw) return;
                try {
                    displayResult(encodeURIComponent(raw));
                    showToast('Encoded', 'success');
                } catch (e) { showToast('Error encoding', 'error'); }
            });

            // Clear Logic
            clearBtn.addEventListener('click', () => {
                inputData.value = '';
                resultBox.classList.add('hidden');
                textOutput.textContent = '';
                inputData.focus();
                // Clear URL hash if present
                history.replaceState(null, null, ' ');
            });

            // Copy Logic
            copyBtn.addEventListener('click', () => {
                const content = textOutput.textContent;
                if (content) copyToClipboard(content);
            });

            // Share Logic
            shareBtn.addEventListener('click', () => {
                const content = textOutput.textContent;
                if (!content) return;
                
                // Construct URL with hash
                // We use encodeURIComponent to ensure special chars traverse the URL safely
                const hash = 'data=' + encodeURIComponent(content);
                const shareUrl = window.location.origin + window.location.pathname + '#' + hash;
                
                copyToClipboard(shareUrl);
                showToast('Link copied to clipboard!', 'success');
            });
        });
    </script>
</body>
</html>
