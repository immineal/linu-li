<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Converter | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>Case Converter</h1>
                <p>Transform text between UPPERCASE, lowercase, Title Case, camelCase, and more.</p>
            </div>

            <div class="card">
                <label for="textInput">Input Text</label>
                <div id="dropZone" class="drop-zone" style="margin-bottom: 1rem; border: 2px dashed var(--border); border-radius: 8px; padding: 1rem; text-align: center; cursor: pointer;">
                    <p style="margin: 0; pointer-events: none;">Drag and drop a .txt file here, or paste below</p>
                    <input type="file" id="fileInput" accept=".txt" style="display: none;">
                </div>
                <textarea id="textInput" class="code-editor" style="min-height: 200px;" placeholder="Type or paste your text here..."></textarea>

                <div class="button-group" style="margin-bottom: 1.5rem; justify-content: center;" id="modeButtons">
                    <button class="button outline" data-mode="upper" onclick="setMode('upper')">UPPERCASE</button>
                    <button class="button outline" data-mode="lower" onclick="setMode('lower')">lowercase</button>
                    <button class="button outline" data-mode="smart-title" onclick="setMode('smart-title')">Smart Title</button>
                    <button class="button outline" data-mode="title" onclick="setMode('title')">Title Case</button>
                    <button class="button outline" data-mode="sentence" onclick="setMode('sentence')">Sentence case</button>
                    <button class="button outline" data-mode="camel" onclick="setMode('camel')">camelCase</button>
                    <button class="button outline" data-mode="snake" onclick="setMode('snake')">snake_case</button>
                    <button class="button outline" data-mode="kebab" onclick="setMode('kebab')">kebab-case</button>
                    <button class="button outline" data-mode="alternating" onclick="setMode('alternating')">aLtErNaTiNg</button>
                </div>

                <div class="result-box hidden" id="resultBox">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
                        <label style="margin-bottom: 0;">Result</label>
                        <div class="button-group" style="margin: 0;">
                            <button class="button sm secondary" id="copyBtn">Copy</button>
                            <button class="button sm outline" id="clearBtn">Clear</button>
                        </div>
                    </div>
                    <textarea id="outputBox" class="code-editor" readonly style="background: var(--paper); min-height: 200px;"></textarea>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    <script>
        const textInput = document.getElementById('textInput');
        const outputBox = document.getElementById('outputBox');
        const resultBox = document.getElementById('resultBox');
        const copyBtn = document.getElementById('copyBtn');
        const clearBtn = document.getElementById('clearBtn');
        const modeButtons = document.querySelectorAll('#modeButtons button');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');

        let activeMode = null;
        let worker = null;

        // Initialize Web Worker
        if (window.Worker) {
            worker = new Worker('worker.js');
            worker.onmessage = function(e) {
                outputBox.value = e.data.result;
                if (e.data.result) {
                    resultBox.classList.remove('hidden');
                } else {
                    resultBox.classList.add('hidden');
                }
            };
        }

        function setMode(type) {
            activeMode = type;
            // Update button visual states
            modeButtons.forEach(btn => {
                if (btn.getAttribute('data-mode') === type) {
                    btn.classList.add('primary');
                    btn.classList.remove('outline');
                } else {
                    btn.classList.remove('primary');
                    btn.classList.add('outline');
                }
            });
            convert();
        }

        function convert() {
            if (!activeMode) return;
            const text = textInput.value;
            if (!text) {
                outputBox.value = '';
                resultBox.classList.add('hidden');
                return;
            }
            if (worker) {
                worker.postMessage({ type: activeMode, text: text });
            }
        }

        // Real-time feedback
        textInput.addEventListener('input', convert);

        copyBtn.addEventListener('click', () => {
            copyToClipboard(outputBox.value);
            const originalText = copyBtn.innerText;
            copyBtn.innerText = 'Copied!';
            setTimeout(() => {
                copyBtn.innerText = originalText;
            }, 2000);
        });
        
        clearBtn.addEventListener('click', () => {
            textInput.value = '';
            outputBox.value = '';
            resultBox.classList.add('hidden');
            activeMode = null;
            modeButtons.forEach(btn => {
                btn.classList.remove('primary');
                btn.classList.add('outline');
            });
            textInput.focus();
        });

        // Setup Drag and Drop Zone if utility is available
        if (typeof setupDropZone === 'function') {
            setupDropZone(dropZone, fileInput, (files) => {
                const file = files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        textInput.value = e.target.result;
                        convert();
                    };
                    reader.readAsText(file);
                }
            });
        }
    </script>
</body>
</html>
