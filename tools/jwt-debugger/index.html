<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Decoder | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    <style>
        .jwt-section {
            margin-bottom: 1.5rem;
        }
        .jwt-label {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: bold;
            margin-bottom: 0.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        /* Standard JWT Colors */
        .color-header { color: #fb015b; }
        .color-payload { color: #d63aff; }
        .color-signature { color: #00b9f1; }
        
        .border-header { border-left: 4px solid #fb015b; }
        .border-payload { border-left: 4px solid #d63aff; }
        .border-signature { border-left: 4px solid #00b9f1; }

        .timestamp-hint {
            color: var(--ink-secondary);
            font-size: 0.8rem;
            font-family: var(--font-body);
            font-style: italic;
            margin-left: 10px;
        }

        /* JSON Syntax Highlighting */
        .json-key { color: var(--accent); font-weight: bold; }
        .json-string { color: var(--accent-secondary); }
        .json-number { color: #d63aff; }
        .json-boolean { color: #00b9f1; }
        .json-null { color: #fb015b; }

        /* Signature Verification */
        .signature-controls {
            margin-top: 1rem;
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        .signature-controls input {
            margin-bottom: 0;
            padding: 0.5rem;
            flex-grow: 1;
        }
        .signature-status {
            padding: 0.25rem 0.75rem;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        .status-waiting { background: var(--border); color: var(--ink-secondary); }
        .status-valid { background: rgba(136, 168, 153, 0.2); color: var(--accent-secondary); border: 1px solid var(--accent-secondary); }
        .status-invalid { background: rgba(251, 1, 91, 0.1); color: #fb015b; border: 1px solid #fb015b; }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>JWT Decoder</h1>
                <p>Decode JSON Web Tokens (JWT) to view their header and payload. <br>Client-side only; tokens never leave your browser.</p>
            </div>

            <div class="split-view">
                
                <!-- INPUT -->
                <div class="card" style="display: flex; flex-direction: column;">
                    <label for="jwtInput">Encoded Token</label>
                    <textarea id="jwtInput" class="code-editor" style="flex-grow: 1; min-height: 400px; color: var(--ink-secondary);" placeholder="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..."></textarea>
                    <div class="button-group">
                        <button class="button outline" id="clearBtn">Clear</button>
                        <button class="button outline" id="pasteBtn">Paste</button>
                    </div>
                </div>

                <!-- OUTPUT -->
                <div class="card">
                    
                    <!-- HEADER -->
                    <div class="jwt-section">
                        <div class="jwt-label color-header">
                            Header
                            <span style="font-size: 0.7rem; opacity: 0.7;">ALGORITHM & TOKEN TYPE</span>
                        </div>
                        <div id="outHeader" class="code-editor border-header" style="min-height: 100px; overflow-y: auto; padding: 1rem; white-space: pre-wrap;"></div>
                    </div>

                    <!-- PAYLOAD -->
                    <div class="jwt-section">
                        <div class="jwt-label color-payload">
                            Payload
                            <span style="font-size: 0.7rem; opacity: 0.7;">DATA</span>
                        </div>
                        <div id="outPayload" class="code-editor border-payload" style="min-height: 250px; overflow-y: auto; padding: 1rem; white-space: pre-wrap;"></div>
                    </div>

                    <!-- SIGNATURE -->
                    <div class="jwt-section">
                        <div class="jwt-label color-signature">
                            Signature
                            <span style="font-size: 0.7rem; opacity: 0.7;">VERIFICATION</span>
                        </div>
                        <div class="code-editor border-signature" style="min-height: 60px; font-family: var(--font-mono); word-break: break-all; color: var(--ink-secondary); padding: 1rem;">
                            <span id="outSignature">waiting for input...</span>
                        </div>
                        <div class="signature-controls">
                            <input type="text" id="signatureSecret" placeholder="Secret (HMAC) or Public Key (RSA/PEM)" autocomplete="off" spellcheck="false">
                            <div id="signatureStatus" class="signature-status status-waiting">Waiting</div>
                        </div>
                    </div>

                </div>
            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    <script>
        const input = document.getElementById('jwtInput');
        const outHeader = document.getElementById('outHeader');
        const outPayload = document.getElementById('outPayload');
        const outSignature = document.getElementById('outSignature');
        const clearBtn = document.getElementById('clearBtn');
        const pasteBtn = document.getElementById('pasteBtn');
        const signatureSecret = document.getElementById('signatureSecret');
        const signatureStatus = document.getElementById('signatureStatus');

        const rtf = new Intl.RelativeTimeFormat('en', { numeric: 'auto' });

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g,
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }

        function formatJSONWithTimestamps(obj) {
            const jsonStr = JSON.stringify(obj, null, 2);
            return jsonStr.replace(/("(\\u[a-zA-Z0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g, function (match) {
                let cls = 'json-number';
                if (/^"/.test(match)) {
                    if (/:$/.test(match)) {
                        cls = 'json-key';
                    } else {
                        cls = 'json-string';
                    }
                } else if (/true|false/.test(match)) {
                    cls = 'json-boolean';
                } else if (/null/.test(match)) {
                    cls = 'json-null';
                }

                // Add timestamp annotations for exp, iat, nbf
                const offset = arguments[arguments.length - 2];
                if (cls === 'json-number' && (jsonStr.substring(Math.max(0, offset - 20), offset).match(/"(exp|iat|nbf)"\s*:\s*$/))) {
                    const ts = parseInt(match, 10);
                    if (ts > 0) {
                        const date = new Date(ts * 1000);
                        const diffInSeconds = Math.round((date - new Date()) / 1000);
                        let hint = '';

                        if (Math.abs(diffInSeconds) < 60) {
                            hint = diffInSeconds >= 0 ? "in a few seconds" : "a few seconds ago";
                        } else if (Math.abs(diffInSeconds) < 3600) {
                            hint = rtf.format(Math.round(diffInSeconds / 60), 'minute');
                        } else if (Math.abs(diffInSeconds) < 86400) {
                            hint = rtf.format(Math.round(diffInSeconds / 3600), 'hour');
                        } else {
                            hint = rtf.format(Math.round(diffInSeconds / 86400), 'day');
                        }

                        return `<span class="${cls}">${match}</span><span class="timestamp-hint"> // ${date.toLocaleString()} (${hint})</span>`;
                    }
                }

                return `<span class="${cls}">${escapeHTML(match)}</span>`;
            });
        }

        async function decode() {
            const token = input.value.trim();
            
            if (!token) {
                resetOutputs();
                return;
            }

            const parts = token.split('.');
            if (parts.length < 2 || parts.length > 3) {
                outHeader.textContent = "Invalid Token Format";
                outPayload.textContent = "";
                outSignature.textContent = "";
                updateSignatureStatus('invalid', 'Invalid Token');
                return;
            }

            try {
                const headerObj = JSON.parse(base64UrlDecode(parts[0]));
                outHeader.innerHTML = formatJSONWithTimestamps(headerObj);

                const payloadObj = JSON.parse(base64UrlDecode(parts[1]));
                outPayload.innerHTML = formatJSONWithTimestamps(payloadObj);
                
                outSignature.textContent = parts[2] || "No signature";

                if (parts.length === 3 && parts[2]) {
                    await verifySignature(token, parts, headerObj);
                } else {
                    updateSignatureStatus('invalid', 'No Signature');
                }

            } catch (e) {
                outHeader.textContent = "Error decoding token. " + e.message;
                outPayload.textContent = "";
                outSignature.textContent = "";
                updateSignatureStatus('invalid', 'Error');
            }
        }

        function base64UrlDecode(str) {
            try {
                let output = str.replace(/-/g, '+').replace(/_/g, '/').replace(/=+$/, '');
                switch (output.length % 4) {
                    case 0: break;
                    case 2: output += '=='; break;
                    case 3: output += '='; break;
                    default: return ''; // Handle malformed without crashing
                }
                // Decode using TextDecoder for robust UTF-8 support
                const binaryStr = window.atob(output);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }
                return new TextDecoder().decode(bytes);
            } catch (e) {
                return ''; // Prevent crashes on completely invalid base64
            }
        }

        function str2ab(str) {
            const buf = new ArrayBuffer(str.length);
            const bufView = new Uint8Array(buf);
            for (let i = 0, strLen = str.length; i < strLen; i++) {
                bufView[i] = str.charCodeAt(i);
            }
            return buf;
        }

        function base64ToUint8Array(base64Str) {
            const padding = '='.repeat((4 - base64Str.length % 4) % 4);
            const base64 = (base64Str + padding).replace(/-/g, '+').replace(/_/g, '/');
            const rawData = window.atob(base64);
            const outputArray = new Uint8Array(rawData.length);
            for (let i = 0; i < rawData.length; ++i) {
                outputArray[i] = rawData.charCodeAt(i);
            }
            return outputArray;
        }

        async function verifySignature(token, parts, header) {
            const secretOrKey = signatureSecret.value;
            if (!secretOrKey) {
                updateSignatureStatus('waiting', 'Awaiting Secret/Key');
                return;
            }

            const alg = header.alg;
            const dataToVerify = `${parts[0]}.${parts[1]}`;
            const signature = parts[2];

            try {
                const enc = new TextEncoder();
                const data = enc.encode(dataToVerify);
                const signatureBuffer = base64ToUint8Array(signature);

                let isValid = false;

                if (alg.startsWith('HS')) {
                    const hashAlg = `SHA-${alg.substring(2)}`;
                    const key = await crypto.subtle.importKey(
                        'raw',
                        enc.encode(secretOrKey),
                        { name: 'HMAC', hash: hashAlg },
                        false,
                        ['verify']
                    );
                    isValid = await crypto.subtle.verify(
                        'HMAC',
                        key,
                        signatureBuffer,
                        data
                    );
                } else if (alg.startsWith('RS')) {
                    const hashAlg = `SHA-${alg.substring(2)}`;
                    // Basic PEM parsing
                    const pemHeader = "-----BEGIN PUBLIC KEY-----";
                    const pemFooter = "-----END PUBLIC KEY-----";
                    let pemContents = secretOrKey;
                    if (pemContents.includes(pemHeader)) {
                        pemContents = pemContents.substring(pemContents.indexOf(pemHeader) + pemHeader.length, pemContents.indexOf(pemFooter)).replace(/\s/g, '');
                    }

                    const binaryDerString = window.atob(pemContents);
                    const binaryDer = str2ab(binaryDerString);

                    const key = await crypto.subtle.importKey(
                        'spki',
                        binaryDer,
                        { name: 'RSASSA-PKCS1-v1_5', hash: hashAlg },
                        false,
                        ['verify']
                    );

                    isValid = await crypto.subtle.verify(
                        'RSASSA-PKCS1-v1_5',
                        key,
                        signatureBuffer,
                        data
                    );
                } else {
                    updateSignatureStatus('invalid', `Unsupported Alg: ${alg}`);
                    return;
                }

                if (isValid) {
                    updateSignatureStatus('valid', 'Signature Verified');
                } else {
                    updateSignatureStatus('invalid', 'Invalid Signature');
                }
            } catch (e) {
                console.error(e);
                updateSignatureStatus('invalid', 'Verification Error');
            }
        }

        function updateSignatureStatus(state, text) {
            signatureStatus.className = 'signature-status status-' + state;

            let icon = '';
            if (state === 'valid') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path><polyline points="22 4 12 14.01 9 11.01"></polyline></svg>';
            if (state === 'invalid') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="15" y1="9" x2="9" y2="15"></line><line x1="9" y1="9" x2="15" y2="15"></line></svg>';
            if (state === 'waiting') icon = '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>';

            signatureStatus.innerHTML = `${icon} ${text}`;
        }

        function resetOutputs() {
            outHeader.textContent = "";
            outPayload.textContent = "";
            outSignature.textContent = "waiting for input...";
            updateSignatureStatus('waiting', 'Waiting');
        }

        input.addEventListener('input', decode);
        signatureSecret.addEventListener('input', decode);
        
        clearBtn.addEventListener('click', () => {
            input.value = '';
            resetOutputs();
        });

        pasteBtn.addEventListener('click', async () => {
            try {
                const text = await navigator.clipboard.readText();
                input.value = text;
                decode();
            } catch (err) {
                showToast('Clipboard permission denied', 'error');
            }
        });
    </script>
</body>
</html>
