<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hash Generator | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    
    <!-- CryptoJS for MD5 support (Native API doesn't support insecure MD5) -->
    <script src="../../assets/vendor/crypto-js.min.js"></script>
    <script src="../../assets/vendor/sha3.min.js"></script>
    <script src="blake2.min.js"></script>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>Hash Generator</h1>
                <p>Generate SHA-256, SHA-512, and MD5 hashes from text or files. Client-side only.</p>
            </div>

            <div class="card">
                
                <div style="margin-bottom: 2rem;">
                    <div class="button-group">
                        <button class="button active" id="modeText">Text</button>
                        <button class="button outline" id="modeFile">File</button>
                    </div>
                </div>

                <!-- TEXT INPUT -->
                <div id="textSection">
                    <label>Input Text</label>
                    <textarea id="textInput" class="code-editor" style="min-height: 150px;" placeholder="Type something to hash..."></textarea>
                </div>

                <!-- FILE INPUT -->
                <div id="fileSection" class="hidden">
                    <div class="drop-zone" id="dropZone">
                        <span class="drop-icon">📁</span>
                        <p>Drag & Drop a file to hash</p>
                        <p style="font-size: 0.8rem; color: var(--ink-secondary);">Large files are supported (processed locally).</p>
                        <input type="file" id="fileInput" class="hidden">
                    </div>
                    <div id="fileNameDisplay" style="margin-top: 1rem; font-weight: bold; color: var(--accent);"></div>
                </div>

                <!-- COMPARE HASH -->
                <div id="compareSection" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    <label>Compare Hash</label>
                    <div style="display: flex; gap: 10px;">
                        <input type="text" id="compareInput" placeholder="Paste a hash here to verify..." style="font-family: var(--font-mono); font-size: 0.9rem;">
                        <button class="button sm secondary" id="clearCompareBtn">Clear</button>
                    </div>
                </div>

                <!-- OUTPUTS -->
                <div id="outputSection" style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 1.5rem;">
                    
                    <div style="margin-bottom: 1.5rem;">
                        <label>SHA-256 (Recommended) <span id="matchSHA256" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outSHA256" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outSHA256')">Copy</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label>SHA-512 (Recommended) <span id="matchSHA512" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outSHA512" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outSHA512')">Copy</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label>MD5 (Legacy) <span id="matchMD5" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outMD5" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outMD5')">Copy</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label>SHA-1 (Legacy) <span id="matchSHA1" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outSHA1" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outSHA1')">Copy</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label>SHA-3 (256-bit) <span id="matchSHA3_256" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outSHA3_256" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outSHA3_256')">Copy</button>
                        </div>
                    </div>

                    <div style="margin-bottom: 1.5rem;">
                        <label>SHA-3 (512-bit) <span id="matchSHA3_512" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outSHA3_512" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outSHA3_512')">Copy</button>
                        </div>
                    </div>

                    <div>
                        <label>BLAKE2b (512-bit) <span id="matchBLAKE2b" class="hidden" style="color: var(--success); font-weight: bold; margin-left: 10px;">✓ Match!</span></label>
                        <div style="display: flex; gap: 10px;">
                            <input type="text" id="outBLAKE2b" readonly style="font-family: var(--font-mono); font-size: 0.9rem;">
                            <button class="button sm secondary" onclick="copyId('outBLAKE2b')">Copy</button>
                        </div>
                    </div>

                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    <script>
        const modeText = document.getElementById('modeText');
        const modeFile = document.getElementById('modeFile');
        const textSection = document.getElementById('textSection');
        const fileSection = document.getElementById('fileSection');
        
        const textInput = document.getElementById('textInput');
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileNameDisplay = document.getElementById('fileNameDisplay');

        const outSHA256 = document.getElementById('outSHA256');
        const outSHA512 = document.getElementById('outSHA512');
        const outMD5 = document.getElementById('outMD5');
        const outSHA1 = document.getElementById('outSHA1');
        const outSHA3_256 = document.getElementById('outSHA3_256');
        const outSHA3_512 = document.getElementById('outSHA3_512');
        const outBLAKE2b = document.getElementById('outBLAKE2b');

        const compareInput = document.getElementById('compareInput');
        const clearCompareBtn = document.getElementById('clearCompareBtn');

        const matchLabels = {
            outSHA256: document.getElementById('matchSHA256'),
            outSHA512: document.getElementById('matchSHA512'),
            outMD5: document.getElementById('matchMD5'),
            outSHA1: document.getElementById('matchSHA1'),
            outSHA3_256: document.getElementById('matchSHA3_256'),
            outSHA3_512: document.getElementById('matchSHA3_512'),
            outBLAKE2b: document.getElementById('matchBLAKE2b')
        };

        // --- Compare Logic ---
        function checkCompare() {
            const compareVal = compareInput.value.trim().toLowerCase();

            // Hide all matches first
            Object.values(matchLabels).forEach(el => el.classList.add('hidden'));

            if (!compareVal) return;

            // Check against current outputs
            const outputs = {
                outSHA256: outSHA256.value.toLowerCase(),
                outSHA512: outSHA512.value.toLowerCase(),
                outMD5: outMD5.value.toLowerCase(),
                outSHA1: outSHA1.value.toLowerCase(),
                outSHA3_256: outSHA3_256.value.toLowerCase(),
                outSHA3_512: outSHA3_512.value.toLowerCase(),
                outBLAKE2b: outBLAKE2b.value.toLowerCase()
            };

            for (const [key, val] of Object.entries(outputs)) {
                if (val && val === compareVal) {
                    matchLabels[key].classList.remove('hidden');
                    compareInput.style.borderColor = 'var(--success)';
                    return;
                }
            }

            // If we have a value but no match
            compareInput.style.borderColor = 'var(--error)';
        }

        compareInput.addEventListener('input', checkCompare);

        clearCompareBtn.addEventListener('click', () => {
            compareInput.value = '';
            compareInput.style.borderColor = '';
            checkCompare();
        });

        // --- Mode Switching ---
        modeText.addEventListener('click', () => {
            modeText.classList.remove('outline');
            modeFile.classList.add('outline');
            textSection.classList.remove('hidden');
            fileSection.classList.add('hidden');
        });

        modeFile.addEventListener('click', () => {
            modeText.classList.add('outline');
            modeFile.classList.remove('outline');
            textSection.classList.add('hidden');
            fileSection.classList.remove('hidden');
        });

        // --- Text Hashing ---
        textInput.addEventListener('input', async () => {
            const val = textInput.value;

            // Native Crypto for SHA
            const msgUint8 = new TextEncoder().encode(val);
            
            // SHA-256
            const hashBuffer256 = await crypto.subtle.digest('SHA-256', msgUint8);
            outSHA256.value = buf2hex(hashBuffer256);

            // SHA-512
            const hashBuffer512 = await crypto.subtle.digest('SHA-512', msgUint8);
            outSHA512.value = buf2hex(hashBuffer512);

            // SHA-1
            const hashBuffer1 = await crypto.subtle.digest('SHA-1', msgUint8);
            outSHA1.value = buf2hex(hashBuffer1);

            // MD5 (via CryptoJS)
            outMD5.value = CryptoJS.MD5(val).toString();

            // SHA-3
            outSHA3_256.value = sha3_256(val);
            outSHA3_512.value = sha3_512(val);

            // BLAKE2b
            outBLAKE2b.value = blakejs.blake2bHex(val);

            checkCompare();
        });

        // --- File Hashing ---
        setupDropZone(dropZone, fileInput, handleFile);

        let hashWorker = null;

        async function handleFile(files) {
            if(files.length === 0) return;
            const file = files[0];
            
            fileNameDisplay.textContent = `Hashing: ${file.name} (${formatFileSize(file.size)}) - 0%`;
            clearOutputs("Hashing...");

            if (hashWorker) {
                hashWorker.terminate();
            }

            hashWorker = new Worker('worker.js');

            hashWorker.onmessage = function(e) {
                const data = e.data;
                if (data.type === 'progress') {
                    fileNameDisplay.textContent = `Hashing: ${file.name} (${formatFileSize(file.size)}) - ${data.progress}%`;
                } else if (data.type === 'done') {
                    fileNameDisplay.textContent = `Hashed: ${file.name} (${formatFileSize(file.size)})`;
                    outSHA256.value = data.hashes.sha256;
                    outSHA512.value = data.hashes.sha512;
                    outSHA1.value = data.hashes.sha1;
                    outMD5.value = data.hashes.md5;
                    outSHA3_256.value = data.hashes.sha3_256;
                    outSHA3_512.value = data.hashes.sha3_512;
                    outBLAKE2b.value = data.hashes.blake2b;

                    checkCompare();

                    hashWorker.terminate();
                    hashWorker = null;
                } else if (data.type === 'error') {
                    console.error("Worker error:", data.message);
                    fileNameDisplay.textContent = `Error hashing ${file.name}`;
                    clearOutputs("Error");
                    hashWorker.terminate();
                    hashWorker = null;
                }
            };

            hashWorker.onerror = function(err) {
                console.error("Worker generic error:", err);
                fileNameDisplay.textContent = `Error hashing ${file.name}`;
                clearOutputs("Error");
                hashWorker.terminate();
                hashWorker = null;
            };

            hashWorker.postMessage({ file: file });
        }

        function clearOutputs(placeholder = "") {
            outSHA256.value = placeholder;
            outSHA512.value = placeholder;
            outMD5.value = placeholder;
            outSHA1.value = placeholder;
            outSHA3_256.value = placeholder;
            outSHA3_512.value = placeholder;
            outBLAKE2b.value = placeholder;
        }

        // Helpers
        function buf2hex(buffer) {
            return [...new Uint8Array(buffer)]
                .map(x => x.toString(16).padStart(2, '0'))
                .join('');
        }

        window.copyId = function(id) {
            const el = document.getElementById(id);
            if(el.value) copyToClipboard(el.value);
        }
    </script>
</body>
</html>
