<!DOCTYPE html>
<html>
<head>
    <title>Worker Test</title>
</head>
<body>
    <script>
        const workerCode = `
            importScripts('../../assets/vendor/pdf-lib.min.js', '../../assets/vendor/jszip.min.js');
            self.onmessage = function(e) {
                if (typeof PDFLib !== 'undefined' && typeof JSZip !== 'undefined') {
                    self.postMessage('Loaded libraries successfully');
                } else {
                    self.postMessage('Failed to load libraries');
                }
            }
        `;
        const blob = new Blob([workerCode], { type: 'application/javascript' });
        const worker = new Worker(URL.createObjectURL(blob));
        worker.onmessage = (e) => {
            console.log(e.data);
            document.body.innerHTML += e.data;
        };
        worker.postMessage('start');
    </script>
</body>
</html>
