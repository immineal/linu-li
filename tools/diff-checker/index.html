<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff Checker | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    
    <script src="../../assets/vendor/diff.min.js"></script>

    <!-- highlight.js -->
    <link rel="stylesheet" id="hljs-light" href="../../assets/vendor/github.min.css">
    <link rel="stylesheet" id="hljs-dark" href="../../assets/vendor/github-dark.min.css" disabled>
    <script src="../../assets/vendor/highlight.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const hljsLight = document.getElementById('hljs-light');
            const hljsDark = document.getElementById('hljs-dark');
            const updateTheme = () => {
                if (document.body.classList.contains('dark-mode')) {
                    hljsLight.disabled = true;
                    hljsDark.disabled = false;
                } else {
                    hljsLight.disabled = false;
                    hljsDark.disabled = true;
                }
            };
            updateTheme();
            new MutationObserver(updateTheme).observe(document.body, { attributes: true, attributeFilter: ['class'] });
        });
    </script>

    <style>
        /* --- View Toggles --- */
        .view-options {
            display: flex;
            gap: 10px;
            margin-bottom: 1rem;
        }
        .view-btn {
            background: transparent;
            border: 1px solid var(--border);
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-size: 0.9rem;
            color: var(--ink-secondary);
        }
        .view-btn.active {
            background: var(--input-bg);
            color: var(--accent);
            border-color: var(--accent);
            font-weight: bold;
        }

        /* --- Diff Table Styles --- */
        .diff-wrapper {
            border: 1px solid var(--border);
            border-radius: 4px;
            background: var(--code-bg);
            font-family: var(--font-mono);
            font-size: 13px;
            position: relative;
        }

        .diff-viewport {
            overflow: auto;
            max-height: 70vh;
            height: 70vh; /* Ensure container has height for virtual scrolling */
            position: relative;
            will-change: transform;
        }

        .diff-spacer {
            position: absolute;
            top: 0;
            left: 0;
            width: 1px;
            z-index: -1;
        }

        .diff-table-container {
            position: absolute;
            top: 0;
            left: 0;
            min-width: 100%;
        }

        table.diff-table {
            width: 100%;
            border-collapse: collapse;
            table-layout: fixed; /* Forces equal width columns in side-by-side */
        }

        /* Loading Overlay */
        .loading-overlay {
            position: absolute;
            inset: 0;
            background: rgba(255, 255, 255, 0.7);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
            font-weight: bold;
            color: var(--accent);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }
        body.dark-mode .loading-overlay {
            background: rgba(0, 0, 0, 0.7);
        }
        .diff-wrapper.is-loading .loading-overlay {
            opacity: 1;
            pointer-events: all;
        }

        .diff-table td, .diff-table th {
            padding: 0;
            vertical-align: top;
        }

        /* Line Numbers */
        .diff-num {
            width: 40px;
            min-width: 40px;
            text-align: right;
            padding: 0 8px;
            color: var(--ink-secondary);
            background: rgba(0,0,0,0.03);
            border-right: 1px solid var(--border);
            user-select: none;
            font-size: 11px;
            opacity: 0.7;
            height: 20px;
            line-height: 20px;
        }

        /* Code Content */
        .diff-code {
            width: 100%;
            padding: 0 8px;
            white-space: pre;
            tab-size: 4;
            height: 20px;
            line-height: 20px;
            overflow: hidden;
        }
        
        /* Colors */
        .diff-row-del { background-color: rgba(196, 77, 60, 0.15); } /* Redish */
        .diff-row-add { background-color: rgba(107, 144, 128, 0.25); } /* Greenish */
        .diff-row-neutral { background-color: transparent; }
        .diff-empty { background-color: rgba(0,0,0,0.02); background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(0,0,0,0.03) 5px, rgba(0,0,0,0.03) 10px); }

        /* Inline Specifics */
        .inline-del { background-color: rgba(196, 77, 60, 0.2); text-decoration: line-through; opacity: 0.8; }
        .inline-add { background-color: rgba(107, 144, 128, 0.3); }

        /* Dark Mode Tweaks */
        body.dark-mode .diff-row-del { background-color: rgba(196, 77, 60, 0.25); }
        body.dark-mode .diff-row-add { background-color: rgba(107, 144, 128, 0.3); }
        body.dark-mode .diff-empty { background-color: rgba(255,255,255,0.03); }
        body.dark-mode .diff-num { background: rgba(255,255,255,0.05); }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>Diff Checker</h1>
                <p>Compare two blocks of text or code. <br>Preserves indentation and supports Side-by-Side view.</p>
            </div>

            <div class="card">
                
                <div class="split-view">
                    <div>
                        <label for="inputOriginal">Original Text</label>
                        <textarea id="inputOriginal" class="code-editor" placeholder="Paste original text here..." spellcheck="false"></textarea>
                    </div>
                    <div>
                        <label for="inputChanged">Modified Text</label>
                        <textarea id="inputChanged" class="code-editor" placeholder="Paste new text here..." spellcheck="false"></textarea>
                    </div>
                </div>

                <div style="display: flex; gap: 1.5rem; align-items: flex-end; flex-wrap: wrap;">
                    <div style="flex-grow: 1; min-width: 200px;">
                        <label for="diffMode">Comparison Method</label>
                        <select id="diffMode" style="margin-bottom: 0;">
                            <option value="lines" selected>Line by Line (Best for Code)</option>
                            <option value="words">Word by Word</option>
                            <option value="chars">Character by Character</option>
                            <option value="json">JSON (Formatted)</option>
                        </select>
                    </div>

                    <div style="padding-bottom: 5px;">
                        <label class="toggle-wrapper" style="margin-bottom: 0;">
                            <input type="checkbox" id="ignoreWhitespace" class="toggle-checkbox">
                            <div class="toggle-switch"></div>
                            <span style="font-size: 0.9rem;">Ignore Whitespace</span>
                        </label>
                    </div>
                    
                    <div class="button-group" style="margin-top: 0;">
                        <button class="button" id="compareBtn">Compare</button>
                        <button class="button outline" id="clearBtn">Clear All</button>
                    </div>
                </div>

                <div class="result-box hidden" id="resultBox">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                        <label style="margin: 0;">Comparison Result</label>
                        
                        <div class="view-options">
                            <button class="view-btn active" id="viewInline" onclick="switchView('inline')">Inline</button>
                            <button class="view-btn" id="viewSide" onclick="switchView('side')">Side-by-Side</button>
                        </div>
                    </div>

                    <div class="diff-wrapper">
                        <div class="diff-viewport" id="diffViewport">
                            <div class="diff-spacer" id="diffSpacer"></div>
                            <div class="diff-table-container" id="diffTableContainer">
                                <table id="diffTable" class="diff-table">
                                    <tbody id="diffTableBody">
                                        <!-- Diff Generated Here -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    
    <script>
        // Elements
        const inputOriginal = document.getElementById('inputOriginal');
        const inputChanged = document.getElementById('inputChanged');
        const compareBtn = document.getElementById('compareBtn');
        const clearBtn = document.getElementById('clearBtn');
        const resultBox = document.getElementById('resultBox');
        const diffTable = document.getElementById('diffTable');
        const diffModeSelect = document.getElementById('diffMode');
        const ignoreWhitespace = document.getElementById('ignoreWhitespace');
        
        const viewInlineBtn = document.getElementById('viewInline');
        const viewSideBtn = document.getElementById('viewSide');

        // State
        let currentInlineRows = null;
        let currentSideRows = null;
        let activeView = 'inline'; // 'inline' or 'side'

        // Web Worker Setup
        let diffWorker = null;

        // --- Switch View Logic ---
        window.switchView = function(view) {
            activeView = view;
            if (view === 'inline') {
                viewInlineBtn.classList.add('active');
                viewSideBtn.classList.remove('active');
            } else {
                viewInlineBtn.classList.remove('active');
                viewSideBtn.classList.add('active');
            }
            
            if (currentInlineRows && currentSideRows) renderDiff();
        };

        // --- Compare Logic ---
        compareBtn.addEventListener('click', () => {
            const text1 = inputOriginal.value;
            const text2 = inputChanged.value;
            const mode = diffModeSelect.value;
            const ignoreSpace = ignoreWhitespace.checked;

            if (!text1 && !text2) {
                showToast('Please enter text to compare.', 'error');
                return;
            }

            // Set UI to loading state
            compareBtn.textContent = 'Comparing...';
            compareBtn.disabled = true;
            document.querySelector('.diff-wrapper').classList.add('is-loading');

            // Initialize or reuse Worker
            if (!diffWorker) {
                diffWorker = new Worker('worker.js');

                diffWorker.onmessage = function(e) {
                    // Reset UI
                    compareBtn.textContent = 'Compare';
                    compareBtn.disabled = false;
                    document.querySelector('.diff-wrapper').classList.remove('is-loading');

                    if (e.data.error) {
                        showToast('Error: ' + e.data.error, 'error');
                        return;
                    }

                    currentInlineRows = e.data.inlineRows;
                    currentSideRows = e.data.sideRows;

                    renderDiff();
                    resultBox.classList.remove('hidden');
                    resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                };

                diffWorker.onerror = function(e) {
                    compareBtn.textContent = 'Compare';
                    compareBtn.disabled = false;
                    document.querySelector('.diff-wrapper').classList.remove('is-loading');
                    showToast('Fatal error generating diff.', 'error');
                    console.error("Worker error:", e);
                };
            }

            // Pass work to Web Worker
            diffWorker.postMessage({
                text1, text2, mode, ignoreSpace
            });
        });

        // --- Rendering Logic (Virtual Scrolling) ---
        const ROW_HEIGHT = 20; // Matches our CSS height
        const BUFFER_ROWS = 20;
        let lastScrollTop = 0;

        const diffViewport = document.getElementById('diffViewport');
        const diffSpacer = document.getElementById('diffSpacer');
        const diffTableContainer = document.getElementById('diffTableContainer');
        const diffTableBody = document.getElementById('diffTableBody');

        function renderDiff() {
            if (!currentInlineRows || !currentSideRows) return;

            const rows = activeView === 'side' ? currentSideRows : currentInlineRows;

            // Set Total Height
            const totalHeight = rows.length * ROW_HEIGHT;
            diffSpacer.style.height = `${totalHeight}px`;

            // Draw Initial View
            renderVisibleRows(0);
        }

        function renderVisibleRows(scrollTop) {
            const rows = activeView === 'side' ? currentSideRows : currentInlineRows;
            if (!rows || rows.length === 0) return;

            const viewportHeight = diffViewport.clientHeight || 500; // fallback if hidden
            
            // Calculate indices
            let startIndex = Math.floor(scrollTop / ROW_HEIGHT);
            let endIndex = Math.min(
                rows.length - 1,
                startIndex + Math.ceil(viewportHeight / ROW_HEIGHT)
            );

            // Apply buffer
            startIndex = Math.max(0, startIndex - BUFFER_ROWS);
            endIndex = Math.min(rows.length - 1, endIndex + BUFFER_ROWS);

            // Position the container
            const offsetY = startIndex * ROW_HEIGHT;
            diffTableContainer.style.transform = `translateY(${offsetY}px)`;

            // Build DOM string
            let htmlStr = '';

            for (let i = startIndex; i <= endIndex; i++) {
                const row = rows[i];
                if (activeView === 'inline') {
                    htmlStr += `
                        <tr>
                            <td class="diff-num">${row.numL}</td>
                            <td class="diff-num">${row.numR}</td>
                            <td class="diff-code ${row.typeClass}">${row.codeHtml}</td>
                        </tr>
                    `;
                } else {
                    const lClass = row.type === 'change' || row.type === 'del' ? 'diff-row-del' : '';
                    const rClass = row.type === 'change' || row.type === 'add' ? 'diff-row-add' : '';

                    const lCode = row.left !== null ? `<td class="diff-code ${lClass}">${row.left}</td>` : `<td class="diff-code diff-empty"></td>`;
                    const rCode = row.right !== null ? `<td class="diff-code ${rClass}">${row.right}</td>` : `<td class="diff-code diff-empty"></td>`;

                    htmlStr += `
                        <tr>
                            <td class="diff-num">${row.numL}</td>
                            ${lCode}
                            <td class="diff-num">${row.numR}</td>
                            ${rCode}
                        </tr>
                    `;
                }
            }

            diffTableBody.innerHTML = htmlStr;
        }

        diffViewport.addEventListener('scroll', () => {
            const currentScrollTop = diffViewport.scrollTop;
            if (Math.abs(currentScrollTop - lastScrollTop) > ROW_HEIGHT) {
                requestAnimationFrame(() => renderVisibleRows(currentScrollTop));
                lastScrollTop = currentScrollTop;
            }
        });

        // --- Actions ---
        clearBtn.addEventListener('click', () => {
            inputOriginal.value = '';
            inputChanged.value = '';
            resultBox.classList.add('hidden');
            diffTableBody.innerHTML = '';
            currentInlineRows = null;
            currentSideRows = null;
        });
    </script>
</body>
</html>
