<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bulk Image Resizer | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    
    <script src="../../assets/vendor/jszip.min.js"></script>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>Bulk Image Resizer</h1>
                <p>Resize multiple images to a specific width while maintaining aspect ratio. Process happens entirely in your browser.</p>
            </div>

            <div class="card">
                
                <div class="split-view">
                    <div>
                        <label for="targetWidth">Target Width (px)</label>
                        <input type="number" id="targetWidth" value="1200" min="1" max="10000" placeholder="Auto">
                    </div>
                    <div>
                        <label for="targetHeight">Target Height (px)</label>
                        <input type="number" id="targetHeight" min="1" max="10000" placeholder="Auto">
                    </div>
                </div>

                <div class="split-view" style="margin-top: 1rem;">
                    <div>
                        <label for="outputFormat">Output Format</label>
                        <select id="outputFormat">
                            <option value="image/jpeg">JPEG (Efficient)</option>
                            <option value="image/png">PNG (Lossless)</option>
                            <option value="image/webp">WebP (Modern)</option>
                        </select>
                    </div>
                    <div style="display: flex; align-items: flex-end; padding-bottom: 0.5rem;">
                        <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer;">
                            <input type="checkbox" id="smartCrop" disabled>
                            <span>Smart Crop (Center)</span>
                        </label>
                    </div>
                </div>

                <div id="qualityWrapper" style="margin-top: 1rem;">
                    <label for="qualityRange">JPEG/WebP Quality (<span id="qualityValue">80</span>%)</label>
                    <input type="range" id="qualityRange" min="10" max="100" value="80">
                </div>

                <div style="margin-top: 1rem; margin-bottom: 1rem;">
                    <label for="namingPattern">File Naming Pattern</label>
                    <input type="text" id="namingPattern" value="{original}_resized.{ext}" placeholder="{original}_{width}x{height}.{ext}">
                    <p style="font-size: 0.8rem; color: var(--ink-secondary); margin-top: 0.25rem;">
                        Variables: <code>{original}</code>, <code>{width}</code>, <code>{height}</code>, <code>{ext}</code>
                    </p>
                </div>

                <div class="drop-zone" id="dropZone">
                    <span class="drop-icon">🖼️</span>
                    <p>Drag & Drop images here</p>
                    <p style="font-size: 0.8rem; color: var(--ink-secondary);">(JPG, PNG, WEBP)</p>
                    <input type="file" id="fileInput" multiple accept="image/*" class="hidden">
                </div>

                <ul class="file-list" id="fileList"></ul>

                <div class="progress-container" id="progressContainer">
                    <div class="progress-fill" id="progressBar"></div>
                </div>

                <div class="button-group">
                    <button class="button" id="resizeBtn" disabled>Resize Images</button>
                    <button class="button outline" id="clearBtn">Clear All</button>
                </div>

                <div class="result-box hidden" id="resultBox">
                    <h3 style="text-align: center;">Processing Complete!</h3>
                    <p style="text-align: center; margin-bottom: 1rem;" id="resultStats"></p>
                    
                    <div style="display: flex; justify-content: center;">
                        <button class="button secondary" id="downloadZipBtn">Download All as ZIP</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <script src="../../assets/js/layout.js"></script>
    
    <script>
        // === DOM ELEMENTS ===
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileListEl = document.getElementById('fileList');
        const resizeBtn = document.getElementById('resizeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const targetWidthInput = document.getElementById('targetWidth');
        const targetHeightInput = document.getElementById('targetHeight');
        const outputFormatInput = document.getElementById('outputFormat');
        const smartCropInput = document.getElementById('smartCrop');
        const namingPatternInput = document.getElementById('namingPattern');
        const qualityRange = document.getElementById('qualityRange');
        const qualityValue = document.getElementById('qualityValue');
        const qualityWrapper = document.getElementById('qualityWrapper');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const resultBox = document.getElementById('resultBox');
        const resultStats = document.getElementById('resultStats');
        const downloadZipBtn = document.getElementById('downloadZipBtn');

        // === STATE ===
        let selectedFiles = [];
        let zipBlob = null;

        // === INITIALIZATION ===
        document.addEventListener('DOMContentLoaded', () => {
            // Setup Layout Helper
            setupDropZone(dropZone, fileInput, handleFiles);
        });

        // Update Quality Label
        qualityRange.addEventListener('input', (e) => {
            qualityValue.textContent = e.target.value;
        });

        // Toggle Smart Crop based on Width and Height
        function updateSmartCropToggle() {
            if (targetWidthInput.value && targetHeightInput.value) {
                smartCropInput.disabled = false;
            } else {
                smartCropInput.disabled = true;
                smartCropInput.checked = false;
            }
        }

        targetWidthInput.addEventListener('input', updateSmartCropToggle);
        targetHeightInput.addEventListener('input', updateSmartCropToggle);

        // Toggle Quality Slider based on format (PNG doesn't use quality in canvas toBlob)
        outputFormatInput.addEventListener('change', (e) => {
            if (e.target.value === 'image/png') {
                qualityWrapper.classList.add('hidden');
            } else {
                qualityWrapper.classList.remove('hidden');
            }
        });

        // === FILE HANDLING ===
        function handleFiles(fileList) {
            const validTypes = ['image/jpeg', 'image/png', 'image/gif', 'image/webp'];
            
            Array.from(fileList).forEach(file => {
                if (validTypes.includes(file.type)) {
                    selectedFiles.push(file);
                } else {
                    showToast(`Skipped ${file.name} (unsupported format)`, 'error');
                }
            });

            updateFileList();
        }

        function updateFileList() {
            fileListEl.innerHTML = '';
            
            selectedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                
                li.innerHTML = `
                    <div class="file-info">
                        <span class="file-name">${file.name}</span>
                        <span class="file-size">${formatFileSize(file.size)}</span>
                    </div>
                    <button class="remove-file" onclick="removeFile(${index})">&times;</button>
                `;
                fileListEl.appendChild(li);
            });

            resizeBtn.disabled = selectedFiles.length === 0;
            
            if (selectedFiles.length > 0) {
                resultBox.classList.add('hidden'); // Hide old results if new files added
            }
        }

        // Exposed to global scope for the onclick handler
        window.removeFile = function(index) {
            selectedFiles.splice(index, 1);
            updateFileList();
        };

        clearBtn.addEventListener('click', () => {
            selectedFiles = [];
            updateFileList();
            resultBox.classList.add('hidden');
            progressContainer.style.display = 'none';
            fileInput.value = ''; // Reset input
        });

        // === IMAGE PROCESSING LOGIC ===
        resizeBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            // UI Reset
            resizeBtn.disabled = true;
            clearBtn.disabled = true;
            resultBox.classList.add('hidden');
            progressContainer.style.display = 'block';
            progressBar.style.width = '0%';
            
            const width = parseInt(targetWidthInput.value) || null;
            const height = parseInt(targetHeightInput.value) || null;
            const format = outputFormatInput.value;
            const quality = parseInt(qualityRange.value) / 100;
            const smartCrop = smartCropInput.checked;
            const namingPattern = namingPatternInput.value || "{original}_resized.{ext}";

            const zip = new JSZip();
            let processedCount = 0;
            let totalSizeOriginal = 0;
            let totalSizeNew = 0;

            // Optional: concurrency control. For now, sequential to avoid massive memory spikes,
            // but the worker prevents main thread blocking.
            try {
                for (let i = 0; i < selectedFiles.length; i++) {
                    const file = selectedFiles[i];
                    totalSizeOriginal += file.size;

                    // Process individual image
                    const result = await resizeImage(file, width, height, format, quality, smartCrop);
                    
                    // Add to ZIP
                    const extension = format === 'image/jpeg' ? 'jpg' : format.split('/')[1];
                    const originalName = file.name.substring(0, file.name.lastIndexOf('.')) || file.name;
                    
                    let newName = namingPattern
                        .replace(/{original}/g, originalName)
                        .replace(/{width}/g, result.width)
                        .replace(/{height}/g, result.height)
                        .replace(/{ext}/g, extension);

                    // fallback if naming pattern doesn't end in ext
                    if (!newName.endsWith('.' + extension)) {
                        newName += '.' + extension;
                    }

                    zip.file(newName, result.blob);
                    totalSizeNew += result.blob.size;

                    // Update Progress
                    processedCount++;
                    const percentage = Math.round((processedCount / selectedFiles.length) * 100);
                    progressBar.style.width = `${percentage}%`;
                }

                // Generate ZIP
                showToast('Generating ZIP file...', 'info');
                zipBlob = await zip.generateAsync({type: "blob"});

                // Show Results
                const savedPercent = Math.round((1 - (totalSizeNew / totalSizeOriginal)) * 100);
                const savedStr = savedPercent > 0 ? `(Saved ${savedPercent}%)` : '';
                
                resultStats.innerHTML = `
                    Processed <strong>${selectedFiles.length}</strong> images.<br>
                    Size: ${formatFileSize(totalSizeOriginal)} &rarr; <strong>${formatFileSize(totalSizeNew)}</strong> ${savedStr}
                `;
                
                resultBox.classList.remove('hidden');
                showToast('Batch processing complete!', 'success');

            } catch (err) {
                console.error(err);
                showToast('An error occurred during processing.', 'error');
            } finally {
                resizeBtn.disabled = false;
                clearBtn.disabled = false;
            }
        });

        // === WORKER SETUP ===
        const workerScript = `
            self.onmessage = async function(e) {
                const { file, targetWidth, targetHeight, format, quality, smartCrop } = e.data;
                try {
                    const bitmap = await createImageBitmap(file);
                    let finalWidth = bitmap.width;
                    let finalHeight = bitmap.height;
                    
                    let sx = 0, sy = 0, sWidth = bitmap.width, sHeight = bitmap.height;

                    if (targetWidth && targetHeight) {
                        finalWidth = targetWidth;
                        finalHeight = targetHeight;
                        if (smartCrop) {
                            // Calculate crop area to cover target aspect ratio
                            const targetAspect = targetWidth / targetHeight;
                            const currentAspect = bitmap.width / bitmap.height;
                            if (currentAspect > targetAspect) {
                                // Image is wider than target aspect
                                sWidth = bitmap.height * targetAspect;
                                sHeight = bitmap.height;
                                sx = (bitmap.width - sWidth) / 2;
                            } else {
                                // Image is taller than target aspect
                                sWidth = bitmap.width;
                                sHeight = bitmap.width / targetAspect;
                                sy = (bitmap.height - sHeight) / 2;
                            }
                        }
                    } else if (targetWidth) {
                        finalWidth = targetWidth;
                        finalHeight = Math.round(bitmap.height * (targetWidth / bitmap.width));
                    } else if (targetHeight) {
                        finalHeight = targetHeight;
                        finalWidth = Math.round(bitmap.width * (targetHeight / bitmap.height));
                    }

                    let blob;
                    if (typeof OffscreenCanvas !== 'undefined') {
                        const canvas = new OffscreenCanvas(finalWidth, finalHeight);
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(bitmap, sx, sy, sWidth, sHeight, 0, 0, finalWidth, finalHeight);
                        blob = await canvas.convertToBlob({ type: format, quality: quality });
                    } else {
                        // Main thread fallback should be handled outside worker if OffscreenCanvas doesn't exist,
                        // but modern browsers support OffscreenCanvas in workers.
                        throw new Error("OffscreenCanvas not supported in worker.");
                    }

                    self.postMessage({ success: true, blob: blob, width: finalWidth, height: finalHeight });
                } catch (error) {
                    self.postMessage({ success: false, error: error.message });
                }
            };
        `;
        const workerBlob = new Blob([workerScript], { type: 'application/javascript' });
        const workerUrl = URL.createObjectURL(workerBlob);

        // Core Resize Function using Web Worker
        function resizeImage(file, targetWidth, targetHeight, format, quality, smartCrop) {
            return new Promise((resolve, reject) => {
                if (typeof OffscreenCanvas !== 'undefined' && window.Worker) {
                    const worker = new Worker(workerUrl);
                    worker.onmessage = (e) => {
                        if (e.data.success) {
                            resolve(e.data);
                        } else {
                            reject(new Error(e.data.error));
                        }
                        worker.terminate();
                    };
                    worker.onerror = (e) => {
                        reject(new Error("Worker error: " + e.message));
                        worker.terminate();
                    };
                    worker.postMessage({ file, targetWidth, targetHeight, format, quality, smartCrop });
                } else {
                    // Fallback to main thread
                    const objectUrl = URL.createObjectURL(file);
                    const img = new Image();
                    img.src = objectUrl;
                    img.onload = () => {
                        URL.revokeObjectURL(objectUrl);
                        if (img.width === 0 || img.height === 0) {
                            return reject(new Error('Invalid image dimensions'));
                        }

                        let finalWidth = img.width;
                        let finalHeight = img.height;
                        let sx = 0, sy = 0, sWidth = img.width, sHeight = img.height;

                        if (targetWidth && targetHeight) {
                            finalWidth = targetWidth;
                            finalHeight = targetHeight;
                            if (smartCrop) {
                                const targetAspect = targetWidth / targetHeight;
                                const currentAspect = img.width / img.height;
                                if (currentAspect > targetAspect) {
                                    sWidth = img.height * targetAspect;
                                    sHeight = img.height;
                                    sx = (img.width - sWidth) / 2;
                                } else {
                                    sWidth = img.width;
                                    sHeight = img.width / targetAspect;
                                    sy = (img.height - sHeight) / 2;
                                }
                            }
                        } else if (targetWidth) {
                            finalWidth = targetWidth;
                            finalHeight = Math.round(img.height * (targetWidth / img.width));
                        } else if (targetHeight) {
                            finalHeight = targetHeight;
                            finalWidth = Math.round(img.width * (targetHeight / img.height));
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = finalWidth;
                        canvas.height = finalHeight;
                        const ctx = canvas.getContext('2d');
                        ctx.imageSmoothingEnabled = true;
                        ctx.imageSmoothingQuality = 'high';
                        ctx.drawImage(img, sx, sy, sWidth, sHeight, 0, 0, finalWidth, finalHeight);

                        canvas.toBlob((blob) => {
                            if (blob) resolve({ blob, width: finalWidth, height: finalHeight });
                            else reject(new Error('Canvas conversion failed'));
                        }, format, quality);
                    };
                    img.onerror = (err) => {
                        URL.revokeObjectURL(objectUrl);
                        reject(err);
                    };
                }
            });
        }

        // === DOWNLOAD HANDLER ===
        downloadZipBtn.addEventListener('click', () => {
            if (!zipBlob) return;
            
            const url = URL.createObjectURL(zipBlob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "resized_images.zip";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            showToast('Download started', 'success');
        });
    </script>
</body>
</html>
