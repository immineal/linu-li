<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Merger | Linus Linhof</title>
    <link rel="stylesheet" href="../../assets/css/style.css">
    <link rel="icon" type="image/svg+xml" href="../../assets/favicon.svg">
    
    <!-- External Libraries -->
    <script src="../../assets/vendor/pdf-lib.min.js"></script>
    <script src="../../assets/vendor/FileSaver.min.js"></script>
    <script src="../../assets/vendor/pdf.min.js"></script>
    
    <style>
        /* Drag & Drop Reordering Styles */
        .file-item {
            cursor: grab;
            transition: transform 0.2s, box-shadow 0.2s, background-color 0.2s;
        }
        .file-item.dragging {
            opacity: 0.5;
            background: var(--code-bg);
            border: 2px dashed var(--accent);
        }
        .file-item.drag-over-target {
            border-top: 2px solid var(--accent);
        }
        .handle {
            cursor: grab;
            padding: 0 10px;
            color: var(--ink-secondary);
            font-size: 1.2rem;
            user-select: none;
        }
    </style>
</head>
<body>
    <main>
        <div class="container">
            <div class="tool-header">
                <h1>PDF Merger</h1>
                <p>Combine multiple PDF documents into a single file. Drag items in the list to reorder.</p>
            </div>

            <div class="card">
                
                <!-- SECTION: FILE UPLOAD -->
                <div class="drop-zone" id="dropZone">
                    <span class="drop-icon">📄</span>
                    <p>Drag & Drop PDF files here</p>
                    <span style="font-size: 0.85rem; color: var(--ink-secondary); margin-top: 0.5rem;">or click to browse</span>
                    <input type="file" id="fileInput" class="hidden" multiple accept=".pdf">
                </div>

                <!-- SECTION: FILE LIST -->
                <ul class="file-list" id="fileList">
                    <!-- Dynamic Content -->
                </ul>

                <!-- SECTION: PROGRESS BAR -->
                <div class="progress-container" id="progressContainer">
                    <div class="progress-fill" id="progressBar"></div>
                </div>

                <!-- SECTION: CONTROLS -->
                <div class="button-group">
                    <button class="button" id="mergeBtn" disabled>Merge PDFs</button>
                    <button class="button outline" id="clearBtn">Clear All</button>
                </div>

                <!-- SECTION: RESULTS -->
                <div class="result-box hidden" id="resultBox">
                    <h3>Success!</h3>
                    <p>Your files have been merged successfully.</p>
                    <div class="button-group">
                        <a href="#" class="button" id="downloadBtn" download="merged.pdf">Download Merged PDF</a>
                        <button class="button outline" id="resetBtn">Merge New Files</button>
                    </div>
                </div>

            </div>
        </div>
    </main>
    
    <!-- CORE LAYOUT SCRIPT -->
    <script src="../../assets/js/layout.js"></script>
    
    <!-- TOOL LOGIC -->
    <script>
        // Configure PDF.js worker
        pdfjsLib.GlobalWorkerOptions.workerSrc = '../../assets/vendor/pdf.worker.min.js';

        // State
        let storedFiles = []; // Array to hold File objects
        const { PDFDocument } = PDFLib;

        // DOM Elements
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const fileList = document.getElementById('fileList');
        const mergeBtn = document.getElementById('mergeBtn');
        const clearBtn = document.getElementById('clearBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const resultBox = document.getElementById('resultBox');
        const downloadBtn = document.getElementById('downloadBtn');
        const resetBtn = document.getElementById('resetBtn');

        // 1. Initialize Upload Drag & Drop
        document.addEventListener('DOMContentLoaded', () => {
            setupDropZone(dropZone, fileInput, handleFiles);
        });

        // 2. Handle New Files
        function handleFiles(files) {
            const newFiles = Array.from(files).filter(f => f.type === 'application/pdf');
            
            if (newFiles.length === 0 && files.length > 0) {
                showToast('Please upload PDF files only.', 'error');
                return;
            }

            storedFiles = [...storedFiles, ...newFiles];
            renderFileList();
            
            if (newFiles.length > 0) {
                showToast(`${newFiles.length} file(s) added`, 'success');
            }
        }

        // 3. Render File List with Sortable Drag & Drop
        function renderFileList() {
            fileList.innerHTML = '';
            
            if (storedFiles.length === 0) {
                fileList.innerHTML = '<li style="text-align:center; color:var(--ink-secondary); padding: 1rem; font-style:italic;">No files selected</li>';
                mergeBtn.disabled = true;
                return;
            }

            mergeBtn.disabled = false;

            storedFiles.forEach((file, index) => {
                const li = document.createElement('li');
                li.className = 'file-item';
                li.setAttribute('draggable', 'true'); // Enable drag
                li.setAttribute('data-index', index);
                
                li.innerHTML = `
                    <div class="file-info" style="pointer-events: none; align-items: center; display: flex; gap: 10px;">
                        <span class="handle" style="pointer-events: auto;">☰</span>
                        <div class="thumb-container" id="thumb-container-${index}" style="width: 40px; height: 50px; background: #f0f0f0; border: 1px solid #ddd; display: flex; align-items: center; justify-content: center; overflow: hidden; border-radius: 4px;">
                            <span style="font-size: 0.8rem; color: #888;">...</span>
                        </div>
                        <div>
                            <div class="file-name" title="${file.name}" style="margin-bottom: 2px;">${file.name}</div>
                            <div class="file-size">${formatFileSize(file.size)}</div>
                        </div>
                    </div>
                    <button class="remove-file" data-index="${index}" title="Remove" style="pointer-events: auto;">×</button>
                `;
                
                // Add Drag Listeners to list item
                addDragListeners(li);
                
                fileList.appendChild(li);

                // Render Thumbnail
                renderThumbnail(file, index);
            });

            // Add remove listeners
            document.querySelectorAll('.remove-file').forEach(btn => {
                btn.addEventListener('click', (e) => removeFile(parseInt(e.target.dataset.index)));
            });
        }

        async function renderThumbnail(file, index) {
            const container = document.getElementById(`thumb-container-${index}`);
            if (!container) return;

            try {
                const url = URL.createObjectURL(file);
                const loadingTask = pdfjsLib.getDocument(url);
                const pdf = await loadingTask.promise;
                const page = await pdf.getPage(1);

                const viewport = page.getViewport({ scale: 1 });
                // Target width 40px
                const scale = 40 / viewport.width;
                const scaledViewport = page.getViewport({ scale });

                const canvas = document.createElement('canvas');
                canvas.width = scaledViewport.width;
                canvas.height = scaledViewport.height;
                const ctx = canvas.getContext('2d');

                // White background to prevent transparent black issue
                ctx.fillStyle = 'white';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                await page.render({
                    canvasContext: ctx,
                    viewport: scaledViewport
                }).promise;

                container.innerHTML = '';
                container.appendChild(canvas);
                URL.revokeObjectURL(url);
            } catch (err) {
                console.error("Thumbnail error:", err);
                container.innerHTML = '<span title="Encrypted file or read error. Merging user-password files might fail." style="font-size: 1.2rem; cursor: help;">🔒</span>';

                // Show a gentle warning about encryption
                if (err.name === 'PasswordException') {
                    showToast(`"${file.name}" is encrypted. Merging may fail if it requires a user password.`, 'warning');
                }
            }
        }

        // --- Drag & Drop Sorting Logic ---
        let draggedItem = null;
        let startIndex = -1;
        let originalY = 0;
        let currentY = 0;
        let placeholder = null;

        function addDragListeners(item) {
            item.removeAttribute('draggable'); // Remove default HTML5 drag

            const handle = item.querySelector('.handle');
            if (!handle) return;

            handle.addEventListener('pointerdown', (e) => {
                e.preventDefault(); // Prevent text selection

                // Initialize drag state
                draggedItem = item;
                startIndex = +item.getAttribute('data-index');
                originalY = item.offsetTop;
                currentY = e.clientY;

                // Create a placeholder to keep spacing
                placeholder = document.createElement('li');
                placeholder.className = 'file-item placeholder';
                placeholder.style.height = `${item.offsetHeight}px`;
                placeholder.style.background = 'transparent';
                placeholder.style.border = '2px dashed var(--accent)';
                placeholder.style.visibility = 'visible';

                item.parentNode.insertBefore(placeholder, item);

                // Style the dragged item for absolute positioning
                const rect = item.getBoundingClientRect();
                item.style.position = 'absolute';
                item.style.top = `${originalY}px`;
                item.style.left = `${item.offsetLeft}px`;
                item.style.width = `${rect.width}px`;
                item.style.zIndex = '1000';
                item.style.boxShadow = '0 10px 20px rgba(0,0,0,0.1)';
                item.classList.add('dragging');

                document.addEventListener('pointermove', onPointerMove);
                document.addEventListener('pointerup', onPointerUp);
            });
        }

        function onPointerMove(e) {
            if (!draggedItem) return;
            
            const dy = e.clientY - currentY;
            const newTop = originalY + dy;
            draggedItem.style.top = `${newTop}px`;

            // Find where to place the placeholder
            const listItems = Array.from(fileList.children).filter(child => child !== draggedItem && child !== placeholder && child.classList.contains('file-item'));

            let targetIndex = listItems.length; // Default to end
            for (let i = 0; i < listItems.length; i++) {
                const child = listItems[i];
                const childRect = child.getBoundingClientRect();
                const childCenterY = childRect.top + childRect.height / 2;

                if (e.clientY < childCenterY) {
                    targetIndex = i;
                    break;
                }
            }

            if (targetIndex < listItems.length) {
                fileList.insertBefore(placeholder, listItems[targetIndex]);
            } else {
                fileList.appendChild(placeholder);
            }
        }
      
            item.addEventListener('drop', (e) => {
                e.stopPropagation();
                e.preventDefault();

                if (dragStartIndex !== undefined) {
                    const dragEndIndex = +item.getAttribute('data-index');
                    swapItems(dragStartIndex, dragEndIndex);
                    dragStartIndex = undefined;
                }

                item.classList.remove('drag-over-target');
                item.classList.remove('dragging');
            });
            
            item.addEventListener('dragend', () => {
                dragStartIndex = undefined;
                item.classList.remove('dragging');
                document.querySelectorAll('.file-item').forEach(i => i.classList.remove('drag-over-target'));
            });
        }

        function swapItems(fromIndex, toIndex) {
            const itemToMove = storedFiles[fromIndex];
            storedFiles.splice(fromIndex, 1);
            storedFiles.splice(toIndex, 0, itemToMove);
            renderFileList();
        }

        // 4. File Manipulation
        function removeFile(index) {
            storedFiles.splice(index, 1);
            renderFileList();
        }

        function clearAll() {
            storedFiles = [];
            fileInput.value = ''; // Reset input
            renderFileList();
            resultBox.classList.add('hidden');
        }

        // 5. Merge Logic
        mergeBtn.addEventListener('click', () => {
            if (storedFiles.length < 2) {
                showToast('Please select at least 2 PDFs to merge.', 'error');
                return;
            }

            // UI Updates
            mergeBtn.disabled = true;
            progressContainer.style.display = 'block';
            progressBar.style.width = '5%';
            resultBox.classList.add('hidden');

            const worker = new Worker('worker.js');

            worker.onmessage = (e) => {
                const { type, percent, data, message } = e.data;
                
                if (type === 'progress') {
                    progressBar.style.width = `${percent}%`;
                } else if (type === 'done') {
                    // Create Blob and Link
                    const blob = new Blob([data], { type: 'application/pdf' });
                    const url = URL.createObjectURL(blob);

                    downloadBtn.href = url;
                    downloadBtn.download = `merged-pdf-${new Date().toISOString().slice(0,10)}.pdf`;

                    progressBar.style.width = '100%';
                    setTimeout(() => {
                        progressContainer.style.display = 'none';
                        progressBar.style.width = '0%';
                        resultBox.classList.remove('hidden');
                        mergeBtn.disabled = false;
                        showToast('PDFs merged successfully!', 'success');

                        // Scroll to result
                        resultBox.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                    }, 500);

                    worker.terminate();
                } else if (type === 'error') {
                    console.error('Worker Error:', message);
                    showToast('Error merging PDFs. Please check file integrity.', 'error');
                    progressContainer.style.display = 'none';
                    mergeBtn.disabled = false;
                    worker.terminate();
                }
            };

            worker.onerror = (err) => {
                console.error('Worker failed:', err);
                showToast('Error processing PDFs in background.', 'error');
                progressContainer.style.display = 'none';
                mergeBtn.disabled = false;
                worker.terminate();
            };

            // Start the worker
            worker.postMessage({ files: storedFiles });
        });

        // 6. Reset / Clear Listeners
        clearBtn.addEventListener('click', clearAll);
        
        resetBtn.addEventListener('click', () => {
            resultBox.classList.add('hidden');
            clearAll();
        });

        // Initial render
        renderFileList();
    </script>
</body>
</html>
